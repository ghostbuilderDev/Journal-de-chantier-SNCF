<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Journal de chantier SNCF - V17</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#82005F">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <style>
    :root{--sncf:#82005f;--sncf2:#a1006b;--green:#00a88f;--bg:#eaf3f5;--card:#fff;--text:#1e1e1e;--muted:#68737d;--line:#d6e0e3;--mine:#d7f8ed;--danger:#d32f2f;--shadow:0 12px 30px rgba(0,0,0,.18)}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
    button,input,textarea,select{font:inherit} .app{height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,#eef8f9,#dfeff2)}
    .topbar{background:linear-gradient(135deg,var(--sncf),var(--sncf2));color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 14px rgba(0,0,0,.18);z-index:5}
    .logo{width:42px;height:42px;border-radius:14px;background:#fff;color:var(--sncf);display:grid;place-items:center;font-weight:900} .title{flex:1;min-width:0} .title h1{font-size:18px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis} .title p{margin:3px 0 0;font-size:12px;opacity:.9}
    .pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:999px;padding:8px 10px}
    .page{flex:1;min-height:0;overflow:auto;padding:14px}
    .card{background:#fff;border-radius:22px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
    .card h2{margin:0 0 8px;color:var(--sncf)} .muted{color:var(--muted);font-size:13px;line-height:1.35}
    .field label{display:block;font-size:12px;color:#53616b;margin-bottom:5px;font-weight:700} .field input{width:100%;border:1px solid var(--line);border-radius:13px;padding:13px;background:#f8fbfc;margin-bottom:10px}
    .btn{border:0;border-radius:14px;padding:12px 15px;font-weight:800;background:var(--sncf);color:#fff} .btn.green{background:var(--green)} .btn.light{background:#eef4f5;color:#26333b}
    .chantierGrid{display:grid;gap:12px} .chantierBtn{width:100%;text-align:left;border:0;background:#fff;border-radius:20px;padding:15px;box-shadow:0 6px 18px rgba(0,0,0,.10);display:flex;gap:12px;align-items:center}
    .chantierIcon{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--sncf),var(--sncf2));color:white;display:grid;place-items:center;font-weight:900}
    .chantierName{font-weight:900;font-size:16px} .chantierCode{font-size:12px;color:var(--muted);margin-top:3px}
    .screen{flex:1;min-height:0;display:flex;flex-direction:column} .toolbar{display:flex;gap:8px;padding:10px;background:rgba(255,255,255,.75);border-bottom:1px solid var(--line);align-items:center} .toolbar input,.toolbar select{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:#fff;min-width:0}
    .messages{flex:1;overflow:auto;padding:14px 10px 96px;background:linear-gradient(180deg,#e8f4f5,#dbecef)} .day{display:table;margin:8px auto 14px;background:rgba(255,255,255,.85);color:#53616b;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700}
    .msg{display:flex;margin:8px 0;gap:8px;align-items:flex-end} .msg.mine{justify-content:flex-end} .avatar{width:32px;height:32px;border-radius:50%;background:var(--sncf);color:white;display:grid;place-items:center;font-weight:900;font-size:12px;flex:0 0 auto}
    .bubble{max-width:min(78%,680px);background:#fff;border-radius:18px 18px 18px 4px;padding:9px 10px;box-shadow:0 2px 8px rgba(0,0,0,.08)} .mine .bubble{background:var(--mine);border-radius:18px 18px 4px 18px} .meta{font-size:12px;color:var(--sncf);font-weight:800;margin-bottom:4px} .txt{white-space:pre-wrap;line-height:1.32} .time{font-size:11px;color:#6f7b84;text-align:right;margin-top:5px} .deleted{color:#7b858c;font-style:italic}
    .mediaGrid{display:grid;gap:4px;margin-top:5px;border-radius:14px;overflow:hidden} .mediaGrid.one{grid-template-columns:1fr} .mediaGrid.two,.mediaGrid.many{grid-template-columns:1fr 1fr} .photo{width:100%;max-height:360px;object-fit:cover;background:#d9e3e6;cursor:pointer;display:block} .mediaGrid.one .photo{object-fit:contain;max-height:440px;background:#111}
    .fileCard{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:13px;padding:10px;margin-top:6px} .fileIcon{width:36px;height:36px;border-radius:10px;background:var(--sncf);color:white;display:grid;place-items:center;font-weight:900} .fileCard a{color:#152936;text-decoration:none;font-weight:700;word-break:break-all}
    .actions{display:flex;gap:8px;margin-top:7px;justify-content:flex-end} .mini{border:0;border-radius:999px;background:rgba(0,0,0,.06);padding:6px 9px;color:#41505a;font-size:12px}
    .composer{position:fixed;left:0;right:0;bottom:0;background:rgba(247,251,252,.96);border-top:1px solid var(--line);padding:9px 9px calc(9px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:flex-end;z-index:10} .round{width:44px;height:44px;border-radius:50%;border:0;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:22px;display:grid;place-items:center;color:var(--sncf)} .composer textarea{flex:1;height:44px;max-height:110px;resize:none;border:0;border-radius:22px;padding:12px 14px;background:#fff;box-shadow:inset 0 0 0 1px var(--line);outline:none} .send{width:46px;height:46px;border-radius:50%;border:0;background:var(--green);color:white;font-size:20px;font-weight:900}
    .previewBar{position:fixed;left:8px;right:8px;bottom:64px;background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:8px;display:none;gap:8px;overflow:auto;z-index:11} .previewItem{position:relative;flex:0 0 auto} .previewItem img{width:78px;height:78px;border-radius:12px;object-fit:cover} .previewItem .x{position:absolute;top:-7px;right:-7px;border:0;background:#222;color:#fff;border-radius:50%;width:22px;height:22px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:20;display:none;align-items:center;justify-content:center} .viewer img{max-width:96vw;max-height:88vh;border-radius:10px} .viewer .close{position:absolute;top:12px;right:12px;border:0;border-radius:50%;width:42px;height:42px;background:#fff;font-size:22px}
    .install-pwa-btn{position:fixed;right:14px;bottom:82px;z-index:9999;display:none;align-items:center;gap:8px;border:0;border-radius:999px;padding:12px 16px;background:#82005F;color:#fff;font-weight:800;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  
    .tabs{display:flex;gap:8px;padding:10px;background:#fff;border-bottom:1px solid var(--line)}
    .tabBtn{flex:1;border:0;border-radius:14px;padding:10px;background:#eef4f5;color:#27343d;font-weight:800}
    .tabBtn.active{background:var(--sncf);color:white}
    .docPanel{flex:1;overflow:auto;padding:14px 10px 96px;background:#eef6f8;display:none}
    .docCard{background:#fff;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
    .docCard h3{margin:0 0 6px;color:var(--sncf)}
    .docLink{display:flex;align-items:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:14px;margin-top:8px;background:#fbfdfe;text-decoration:none;color:#17262f;font-weight:800}
    .docIcon{width:34px;height:34px;border-radius:10px;background:var(--sncf);color:white;display:grid;place-items:center}
    .docForm{display:grid;gap:8px;margin-top:10px}
    .docForm input{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px;background:#f8fbfc}
    .notifStatus{font-size:12px;color:#fff;opacity:.9}

  </style>
</head>
<body>
<div class="app">
<header class="topbar">
  <div class="logo">JC</div>
  <div class="title"><h1 id="headTitle">Journal de chantier SNCF</h1><p id="headSub">V17 documents SharePoint + notifications</p></div>
  <button class="pill" id="homeBtn" onclick="goHome()" style="display:none">Accueil</button>
  <button class="pill" onclick="window.print()">PDF</button>
</header>

<section id="home" class="page">
  <div class="card">
    <h2>Mes informations</h2>
    <p class="muted">Ces informations servent à signer automatiquement tes messages.</p>
    <div class="field"><label>Ton nom</label><input id="userName" placeholder="Yoann PETIT"></div>
    <div class="field"><label>Entreprise / rôle</label><input id="userRole" placeholder="SNCF / RLT"></div>
    <button class="btn green" onclick="saveUser()">Enregistrer</button>
  </div>
  <div class="card">
    <h2>Mes chantiers</h2>
    <p class="muted">Clique sur un chantier pour ouvrir son fil d’actualité. Chaque chantier possède son propre journal.</p>
    <div id="chantierList" class="chantierGrid"></div>
  </div>
  <div class="card">
    <h2>Ajouter un chantier</h2>
    <div class="field"><label>Nom du chantier</label><input id="newChantierName" placeholder="Ex : Dordives"></div>
    <div class="field"><label>Code chantier</label><input id="newChantierCode" placeholder="Ex : DORDIVES-2026"></div>
    <div class="field"><label>Lien SharePoint du chantier</label><input id="newChantierSharepoint" placeholder="https://...sharepoint.com/sites/..."></div>
    <button class="btn" onclick="addLocalChantier()">Ajouter à la liste</button>
  </div>
</section>

<section id="main" class="screen" style="display:none">
  <div class="tabs">
    <button id="tabFil" class="tabBtn active" onclick="showTab('fil')">Fil d’actualité</button>
    <button id="tabDocs" class="tabBtn" onclick="showTab('docs')">Base documentaire</button>
  </div>
  <div id="filZone" class="screen">
    <div class="toolbar"><input id="search" placeholder="Rechercher..." oninput="renderMessages()"><select id="typeFilter" onchange="renderMessages()"><option value="">Tous</option><option>Info</option><option>Sécurité</option><option>Travaux</option><option>Incident</option><option>Photo</option></select></div>
    <main id="messages" class="messages"></main>
  </div>
  <div id="docPanel" class="docPanel"></div>
</section>
</div>

<div id="previewBar" class="previewBar"></div>
<div class="composer" id="composer" style="display:none"><button class="round" onclick="fileInput.click()">＋</button><input id="fileInput" type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" multiple hidden onchange="handleFiles(this.files)"><textarea id="messageText" placeholder="Message" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea><select id="msgType" style="width:92px;border:0;border-radius:22px;padding:0 8px;background:#fff;box-shadow:inset 0 0 0 1px var(--line);height:44px"><option>Info</option><option>Sécurité</option><option>Travaux</option><option>Incident</option><option>Photo</option></select><button class="send" onclick="sendMessage()">➤</button></div>
<div id="viewer" class="modal viewer" onclick="this.style.display='none'"><button class="close">×</button><img id="viewerImg"></div>
<button id="installPwaBtn" class="install-pwa-btn" onclick="installerApplicationPWA()">📲 Installer l’application</button>

<script>
const SUPABASE_URL_INTEGREE = "https://mrqxazwipawkdmxwhssr.supabase.co";
const SUPABASE_KEY_INTEGREE = "sb_publishable_GVA0gxGRECTC-44666Ev6g_tRXeCPbz";
const BUCKET='chantier-media-v12';
const DEFAULT_CHANTIERS=[
  {name:'Samois',code:'SAMOIS-2026',sharepoint:''},
  {name:'Montereau',code:'MONTEREAU-2026',sharepoint:''},
  {name:'Garenne',code:'GARENNE-2026',sharepoint:''}
];
let sb=supabase.createClient(SUPABASE_URL_INTEGREE,SUPABASE_KEY_INTEGREE), chantierId=null, currentChantier=null, config={}, journalMessages=[], hiddenIds=new Set(), pendingFiles=[], channel=null, deferredPwaPrompt=null;

if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(console.warn));
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPwaPrompt=e;installPwaBtn.style.display='inline-flex'});
async function installerApplicationPWA(){if(!deferredPwaPrompt){alert("Depuis Chrome : menu ⋮ puis Installer l’application ou Ajouter à l’écran d’accueil.");return}deferredPwaPrompt.prompt();await deferredPwaPrompt.userChoice;installPwaBtn.style.display='none';deferredPwaPrompt=null}
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+"-"+Math.random().toString(16).slice(2)}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
window.addEventListener('load',()=>{loadUser();renderChantiers()});
function loadUser(){const u=JSON.parse(localStorage.getItem('jc_v17_user')||'{}');userName.value=u.name||'';userRole.value=u.role||'';config.name=u.name||'';config.role=u.role||''}
function saveUser(){config.name=userName.value.trim()||'Utilisateur';config.role=userRole.value.trim()||'';localStorage.setItem('jc_v17_user',JSON.stringify({name:config.name,role:config.role}));alert('Informations enregistrées');askNotificationPermission()}
function getChantiers(){let list=DEFAULT_CHANTIERS.slice();try{const extra=JSON.parse(localStorage.getItem('jc_v17_chantiers')||'[]');list=list.concat(extra)}catch(e){}return list}
function renderChantiers(){const box=document.getElementById('chantierList');box.innerHTML='';getChantiers().forEach(c=>{box.insertAdjacentHTML('beforeend',`<button class="chantierBtn" onclick="openChantier('${esc(c.code)}','${esc(c.name)}','${esc(c.sharepoint||'')}')"><div class="chantierIcon">${esc(c.name.slice(0,2).toUpperCase())}</div><div><div class="chantierName">${esc(c.name)}</div><div class="chantierCode">${esc(c.code)}</div></div></button>`)})}
function addLocalChantier(){const name=newChantierName.value.trim(),code=newChantierCode.value.trim().toUpperCase(),sharepoint=(document.getElementById('newChantierSharepoint')?.value||'').trim();if(!name||!code){alert('Nom et code obligatoires');return}const extra=JSON.parse(localStorage.getItem('jc_v17_chantiers')||'[]');extra.push({name,code,sharepoint});localStorage.setItem('jc_v17_chantiers',JSON.stringify(extra));newChantierName.value='';newChantierCode.value='';if(document.getElementById('newChantierSharepoint'))newChantierSharepoint.value='';renderChantiers()}
async function openChantier(code,name,sharepoint=''){if(!userName.value.trim()){alert('Indique ton nom avant d’ouvrir un chantier.');return}saveUserNoAlert();currentChantier={code,name,sharepoint};askNotificationPermission();try{let {data,error}=await sb.from('chantiers').select('*').eq('code',code).maybeSingle();if(error)throw error;if(!data){const ins=await sb.from('chantiers').insert({code,name,created_by:config.name}).select('*').single();if(ins.error)throw ins.error;data=ins.data}chantierId=data.id;headTitle.textContent='Journal - '+data.name;headSub.textContent=code+' • '+config.name+(config.role?' • '+config.role:'');home.style.display='none';main.style.display='flex';composer.style.display='flex';homeBtn.style.display='inline-block';await loadMessages();subscribeRealtime()}catch(e){alert('Erreur ouverture chantier : '+(e.message||e))}}
function saveUserNoAlert(){config.name=userName.value.trim()||'Utilisateur';config.role=userRole.value.trim()||'';localStorage.setItem('jc_v17_user',JSON.stringify({name:config.name,role:config.role}))}
function goHome(){main.style.display='none';composer.style.display='none';home.style.display='block';homeBtn.style.display='none';headTitle.textContent='Journal de chantier SNCF';headSub.textContent='V17 documents SharePoint + notifications';if(channel)sb.removeChannel(channel)}
async function loadMessages(){const {data,error}=await sb.from('chantier_messages').select('*').eq('chantier_id',chantierId).order('created_at',{ascending:true});if(error){alert('Erreur lecture messages : '+error.message);return}journalMessages=data||[];renderMessages()}
function subscribeRealtime(){if(channel)sb.removeChannel(channel);channel=sb.channel('jc-v17-'+chantierId).on('postgres_changes',{event:'INSERT',schema:'public',table:'chantier_messages',filter:'chantier_id=eq.'+chantierId},payload=>{notifyNewMessage(payload.new);loadMessages()}).on('postgres_changes',{event:'UPDATE',schema:'public',table:'chantier_messages',filter:'chantier_id=eq.'+chantierId},loadMessages).subscribe()}
function renderMessages(){
  const box=document.getElementById('messages');
  const q=(document.getElementById('search').value||'').toLowerCase();
  const ft=document.getElementById('typeFilter').value;
  box.innerHTML='';
  let lastDay='';
  const visible=journalMessages
    .filter(m=>!hiddenIds.has(m.id))
    .filter(m=>(!ft||m.type===ft))
    .filter(m=>(!q||String(m.content||'').toLowerCase().includes(q)||String(m.author_name||'').toLowerCase().includes(q)));

  if(!visible.length){
    box.innerHTML='<div class="day">Aucun message</div>';
    return;
  }

  for(const m of visible){
    const day=new Date(m.created_at).toLocaleDateString('fr-FR');
    if(day!==lastDay){
      box.insertAdjacentHTML('beforeend',`<div class="day">${day}</div>`);
      lastDay=day;
    }

    const mine=m.author_name===config.name;
    const atts=Array.isArray(m.attachments)?m.attachments:[];
    const imgs=atts.filter(a=>a.kind==='image');
    const files=atts.filter(a=>a.kind!=='image');
    const cls=imgs.length===1?'one':imgs.length===2?'two':'many';

    const imgHtml=imgs.length
      ? `<div class="mediaGrid ${cls}">${imgs.map(a=>`<img class="photo" src="${esc(a.url)}" onclick="openImage('${esc(a.url)}')">`).join('')}</div>`
      : '';

    const fileHtml=files.map(a=>`<div class="fileCard"><div class="fileIcon">F</div><a href="${esc(a.url)}" target="_blank">${esc(a.name||'Fichier')}</a></div>`).join('');

    const txt=m.deleted_for_all
      ? '<div class="deleted">Message supprimé pour tout le monde</div>'
      : `<div class="txt">${esc(m.content||'')}</div>${imgHtml}${fileHtml}`;

    box.insertAdjacentHTML('beforeend',`
      <div class="msg ${mine?'mine':''}">
        ${mine?'':`<div class="avatar">${esc((m.author_name||'U').slice(0,2).toUpperCase())}</div>`}
        <div class="bubble">
          <div class="meta">${esc(m.author_name||'Utilisateur')} ${m.type?`• ${esc(m.type)}`:''}</div>
          ${txt}
          <div class="time">${new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
          ${!m.deleted_for_all?`<div class="actions"><button class="mini" onclick="deleteForMe('${m.id}')">Supprimer pour moi</button><button class="mini" onclick="deleteForAll('${m.id}')">Supprimer pour tout le monde</button></div>`:''}
        </div>
      </div>`);
  }
  box.scrollTop=box.scrollHeight;
}
function openImage(url){viewerImg.src=url;viewer.style.display='flex'}
function handleFiles(files){[...files].forEach(f=>{const isImg=f.type.startsWith('image/');const item={id:uid(),file:f,kind:isImg?'image':'file',name:f.name,type:f.type,preview:null};if(isImg){const r=new FileReader();r.onload=()=>{item.preview=r.result;pendingFiles.push(item);renderPreview()};r.readAsDataURL(f)}else{pendingFiles.push(item);renderPreview()}});fileInput.value=''}
function renderPreview(){previewBar.innerHTML='';if(!pendingFiles.length){previewBar.style.display='none';return}previewBar.style.display='flex';pendingFiles.forEach((p,i)=>{const div=document.createElement('div');div.className='previewItem';div.innerHTML=p.kind==='image'?`<img src="${p.preview}"><button class="x">×</button>`:`<div class="fileCard" style="width:180px"><div class="fileIcon">F</div><div>${esc(p.name)}</div><button class="x">×</button></div>`;div.querySelector('.x').onclick=()=>{pendingFiles.splice(i,1);renderPreview()};previewBar.appendChild(div)})}
async function sendMessage(){const content=messageText.value.trim();if(!content&&!pendingFiles.length)return;try{const attachments=[];for(const p of pendingFiles){const ext=(p.name.split('.').pop()||'bin').toLowerCase();const path=`${currentChantier.code}/${Date.now()}-${uid()}.${ext}`;const {error:upErr}=await sb.storage.from(BUCKET).upload(path,p.file,{upsert:false,contentType:p.type||'application/octet-stream'});if(upErr)throw upErr;const {data:pub}=sb.storage.from(BUCKET).getPublicUrl(path);attachments.push({kind:p.kind,name:p.name,type:p.type,url:pub.publicUrl,path})}const {error}=await sb.from('chantier_messages').insert({chantier_id:chantierId,author_name:config.name,author_role:config.role,type:msgType.value,content,attachments});if(error)throw error;messageText.value='';pendingFiles=[];renderPreview();await loadMessages()}catch(e){alert('Erreur envoi : '+(e.message||e))}}
function deleteForMe(id){hiddenIds.add(id);renderMessages()}
async function deleteForAll(id){if(!confirm('Supprimer ce message pour tout le monde ?'))return;const {error}=await sb.from('chantier_messages').update({deleted_for_all:true,content:'',attachments:[]}).eq('id',id);if(error)alert(error.message);else loadMessages()}

function showTab(tab){
  const fil = document.getElementById('filZone');
  const docs = document.getElementById('docPanel');
  const bFil = document.getElementById('tabFil');
  const bDocs = document.getElementById('tabDocs');
  if(tab==='docs'){
    fil.style.display='none'; docs.style.display='block';
    bFil.classList.remove('active'); bDocs.classList.add('active');
    composer.style.display='none';
    renderDocs();
  }else{
    fil.style.display='flex'; docs.style.display='none';
    bDocs.classList.remove('active'); bFil.classList.add('active');
    composer.style.display='flex';
  }
}

function getDocLinks(){
  try{return JSON.parse(localStorage.getItem('jc_v17_docs_'+currentChantier.code)||'[]')}catch(e){return []}
}

function saveDocLinks(list){
  localStorage.setItem('jc_v17_docs_'+currentChantier.code, JSON.stringify(list));
}

function renderDocs(){
  if(!currentChantier) return;
  const box = document.getElementById('docPanel');
  const docs = getDocLinks();
  const sp = currentChantier.sharepoint || '';
  box.innerHTML = `
    <div class="docCard">
      <h3>Base documentaire - ${esc(currentChantier.name)}</h3>
      <div class="muted">Regroupe les liens utiles du chantier : SharePoint, plans, procédures, CR, photos, fiches prestations, documents sécurité.</div>
      ${sp ? `<a class="docLink" href="${esc(sp)}" target="_blank"><span class="docIcon">SP</span><span>Ouvrir le SharePoint du chantier</span></a>` : `<div class="muted" style="margin-top:8px">Aucun lien SharePoint renseigné pour ce chantier.</div>`}
    </div>
    <div class="docCard">
      <h3>Ajouter un lien documentaire</h3>
      <div class="docForm">
        <input id="docTitle" placeholder="Titre du document ou dossier">
        <input id="docUrl" placeholder="Lien SharePoint / OneDrive / PDF / dossier">
        <button class="btn green" onclick="addDocLink()">Ajouter le lien</button>
      </div>
    </div>
    <div class="docCard">
      <h3>Documents enregistrés</h3>
      ${docs.length ? docs.map((d,i)=>`<a class="docLink" href="${esc(d.url)}" target="_blank"><span class="docIcon">D</span><span>${esc(d.title)}</span></a><button class="mini" onclick="removeDocLink(${i})">Supprimer ce lien</button>`).join('') : `<div class="muted">Aucun document enregistré pour ce chantier.</div>`}
    </div>
  `;
}

function addDocLink(){
  const title = document.getElementById('docTitle').value.trim();
  const url = document.getElementById('docUrl').value.trim();
  if(!title || !url){ alert('Titre et lien obligatoires'); return; }
  const list = getDocLinks();
  list.push({title,url,created_at:new Date().toISOString()});
  saveDocLinks(list);
  renderDocs();
}

function removeDocLink(i){
  const list = getDocLinks();
  list.splice(i,1);
  saveDocLinks(list);
  renderDocs();
}

function askNotificationPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    Notification.requestPermission();
  }
}

function notifyNewMessage(m){
  if(!('Notification' in window)) return;
  if(Notification.permission !== 'granted') return;
  if(!m || m.author_name === config.name) return;
  const title = 'Nouveau message - ' + (currentChantier ? currentChantier.name : 'chantier');
  const body = (m.author_name || 'Utilisateur') + ' : ' + (m.content ? m.content.slice(0,90) : 'Photo / fichier');
  try{ new Notification(title,{body}); }catch(e){}
}

</script>
</body></html>
