<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Journal de chantier SNCF - V12</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --sncf:#82005f;--sncf2:#a1006b;--green:#00a88f;--bg:#eaf3f5;--card:#fff;
      --text:#1e1e1e;--muted:#68737d;--line:#d6e0e3;--bubble:#ffffff;--mine:#d7f8ed;
      --danger:#d32f2f;--shadow:0 12px 30px rgba(0,0,0,.18);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
    button,input,textarea,select{font:inherit}
    .app{height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,#eef8f9,#dfeff2)}
    .topbar{background:linear-gradient(135deg,var(--sncf),var(--sncf2));color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 14px rgba(0,0,0,.18);z-index:5}
    .logo{width:42px;height:42px;border-radius:14px;background:#fff;color:var(--sncf);display:grid;place-items:center;font-weight:900}
    .title{flex:1;min-width:0}.title h1{font-size:18px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title p{margin:3px 0 0;font-size:12px;opacity:.9}
    .pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:999px;padding:8px 10px}
    .screen{flex:1;min-height:0;display:flex;flex-direction:column}
    .setup{max-width:720px;margin:22px auto;padding:18px;width:calc(100% - 24px);background:#fff;border-radius:22px;box-shadow:var(--shadow)}
    .setup h2{margin:0 0 8px;color:var(--sncf)}.setup p{color:var(--muted);margin:0 0 14px;line-height:1.35}
    .grid{display:grid;gap:10px}.field label{display:block;font-size:12px;color:#53616b;margin-bottom:5px;font-weight:700}
    .field input{width:100%;border:1px solid var(--line);border-radius:13px;padding:13px;background:#f8fbfc}
    .btn{border:0;border-radius:14px;padding:12px 15px;font-weight:800;background:var(--sncf);color:#fff;cursor:pointer}
    .btn.secondary{background:#edf3f5;color:#24323a}.btn.green{background:var(--green)}.btn.danger{background:var(--danger)}
    .toolbar{display:flex;gap:8px;padding:10px;background:rgba(255,255,255,.75);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);align-items:center}
    .toolbar input,.toolbar select{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:#fff;min-width:0}
    .messages{flex:1;overflow:auto;padding:14px 10px 96px;background:
      radial-gradient(circle at 20% 10%,rgba(255,255,255,.65),transparent 24%),
      linear-gradient(180deg,#e8f4f5,#dbecef)}
    .day{display:table;margin:8px auto 14px;background:rgba(255,255,255,.85);color:#53616b;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700}
    .msg{display:flex;margin:8px 0;gap:8px;align-items:flex-end}.msg.mine{justify-content:flex-end}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--sncf);color:white;display:grid;place-items:center;font-weight:900;font-size:12px;flex:0 0 auto}
    .bubble{max-width:min(78%,680px);background:var(--bubble);border-radius:18px 18px 18px 4px;padding:9px 10px;box-shadow:0 2px 8px rgba(0,0,0,.08);position:relative}
    .mine .bubble{background:var(--mine);border-radius:18px 18px 4px 18px}
    .meta{font-size:12px;color:var(--sncf);font-weight:800;margin-bottom:4px}.txt{white-space:pre-wrap;line-height:1.32}
    .time{font-size:11px;color:#6f7b84;text-align:right;margin-top:5px}.deleted{color:#7b858c;font-style:italic}
    .mediaGrid{display:grid;gap:4px;margin-top:5px;border-radius:14px;overflow:hidden}
    .mediaGrid.one{grid-template-columns:1fr}.mediaGrid.two{grid-template-columns:1fr 1fr}.mediaGrid.many{grid-template-columns:1fr 1fr}
    .photo{width:100%;max-height:360px;object-fit:cover;background:#d9e3e6;cursor:pointer;display:block}
    .mediaGrid.one .photo{object-fit:contain;max-height:440px;background:#111}
    .fileCard{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:13px;padding:10px;margin-top:6px}
    .fileIcon{width:36px;height:36px;border-radius:10px;background:var(--sncf);color:white;display:grid;place-items:center;font-weight:900}
    .fileCard a{color:#152936;text-decoration:none;font-weight:700;word-break:break-all}
    .actions{display:flex;gap:8px;margin-top:7px;justify-content:flex-end}.mini{border:0;border-radius:999px;background:rgba(0,0,0,.06);padding:6px 9px;color:#41505a;font-size:12px}
    .composer{position:fixed;left:0;right:0;bottom:0;background:rgba(247,251,252,.96);border-top:1px solid var(--line);padding:9px 9px calc(9px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:flex-end;z-index:10}
    .round{width:44px;height:44px;border-radius:50%;border:0;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:22px;display:grid;place-items:center;color:var(--sncf)}
    .composer textarea{flex:1;height:44px;max-height:110px;resize:none;border:0;border-radius:22px;padding:12px 14px;background:#fff;box-shadow:inset 0 0 0 1px var(--line);outline:none}
    .send{width:46px;height:46px;border-radius:50%;border:0;background:var(--green);color:white;font-size:20px;font-weight:900}
    .previewBar{position:fixed;left:8px;right:8px;bottom:64px;background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:8px;display:none;gap:8px;overflow:auto;z-index:11}
    .previewItem{position:relative;flex:0 0 auto}.previewItem img{width:78px;height:78px;border-radius:12px;object-fit:cover}.previewItem .x{position:absolute;top:-7px;right:-7px;border:0;background:#222;color:#fff;border-radius:50%;width:22px;height:22px}.previewItem .edit{position:absolute;bottom:4px;left:4px;border:0;background:rgba(255,255,255,.92);border-radius:999px;padding:3px 6px;font-size:11px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:20;display:none;align-items:center;justify-content:center}
    .viewer img{max-width:96vw;max-height:88vh;border-radius:10px}.viewer .close,.annot .close{position:absolute;top:12px;right:12px;border:0;border-radius:50%;width:42px;height:42px;background:#fff;font-size:22px}
    .annot{background:#202529;display:none;flex-direction:column}.annotTop{display:flex;gap:6px;align-items:center;padding:8px;background:#111;color:white;overflow:auto}.annotTop button,.annotTop select,.annotTop input{border:0;border-radius:10px;padding:8px;background:#fff;color:#111}.annotTop .save{background:var(--green);color:white;font-weight:900}
    .canvasWrap{flex:1;display:grid;place-items:center;min-height:0}.canvasWrap canvas{max-width:100vw;max-height:calc(100vh - 62px);background:white;touch-action:none}
    .toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#111;color:#fff;padding:10px 14px;border-radius:999px;display:none;z-index:50}
    @media print{.topbar,.toolbar,.composer,.previewBar,.actions{display:none!important}body{overflow:auto}.app{height:auto}.messages{overflow:visible;padding:10px;background:#fff}.bubble{box-shadow:none;border:1px solid #ddd;max-width:100%}}
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="logo">S</div>
    <div class="title"><h1 id="headTitle">Journal de chantier SNCF</h1><p id="headSub">V12 multi-utilisateurs Supabase</p></div>
    <button class="pill" onclick="window.print()">PDF</button>
    <button class="pill" onclick="resetConfig()">Config</button>
  </header>

  <section id="setup" class="setup">
    <h2>Connexion au journal</h2>
    <p>Colle les informations Supabase, indique ton nom et le code chantier. Les personnes ayant le même code chantier verront le même fil.</p>
    <div class="grid">
      <div class="field"><label>URL Supabase</label><input id="supabaseUrl" placeholder="https://xxxx.supabase.co"></div>
      <div class="field"><label>Clé publishable / anon</label><input id="supabaseKey" placeholder="eyJ..."></div>
      <div class="field"><label>Code chantier partagé</label><input id="chantierCode" value="SAMOIS-2026"></div>
      <div class="field"><label>Ton nom</label><input id="userName" placeholder="Yoann PETIT"></div>
      <div class="field"><label>Entreprise / rôle</label><input id="userRole" placeholder="SNCF / RLT"></div>
      <button class="btn green" onclick="connectApp()">Enregistrer et connecter</button>
    </div>
  </section>

  <section id="main" class="screen" style="display:none">
    <div class="toolbar">
      <input id="search" placeholder="Rechercher..." oninput="renderMessages()">
      <select id="typeFilter" onchange="renderMessages()"><option value="">Tous</option><option>Info</option><option>Sécurité</option><option>Travaux</option><option>Incident</option><option>Photo</option></select>
    </div>
    <main id="messages" class="messages"></main>
  </section>
</div>

<div id="previewBar" class="previewBar"></div>

<div class="composer" id="composer" style="display:none">
  <button class="round" onclick="fileInput.click()">＋</button>
  <input id="fileInput" type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" multiple hidden onchange="handleFiles(this.files)">
  <textarea id="messageText" placeholder="Message" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
  <select id="msgType" style="width:92px;border:0;border-radius:22px;padding:0 8px;background:#fff;box-shadow:inset 0 0 0 1px var(--line);height:44px"><option>Info</option><option>Sécurité</option><option>Travaux</option><option>Incident</option><option>Photo</option></select>
  <button class="send" onclick="sendMessage()">➤</button>
</div>

<div id="viewer" class="modal viewer" onclick="this.style.display='none'"><button class="close">×</button><img id="viewerImg"></div>

<div id="annot" class="modal annot">
  <div class="annotTop">
    <button onclick="setTool('draw')">Crayon</button><button onclick="setTool('text')">Texte</button><button onclick="setTool('arrow')">Flèche</button><button onclick="setTool('rect')">Rectangle</button><button onclick="setTool('circle')">Rond</button><button onclick="setTool('highlight')">Surlignage</button><button onclick="setTool('eraser')">Gomme</button>
    <input id="color" type="color" value="#ff0000"><select id="size"><option>3</option><option>6</option><option>10</option><option>18</option></select>
    <button onclick="undoAnnot()">Annuler</button><button class="save" onclick="saveAnnotation()">Enregistrer</button><button onclick="closeAnnot()">Fermer</button>
  </div>
  <div class="canvasWrap"><canvas id="canvas"></canvas></div>
</div>

<div id="toast" class="toast"></div>

<script>
let sb=null, chantierId=null, config={}, messages=[], hiddenIds=new Set(), pendingFiles=[], currentAnnotIndex=null, channel=null;
let tool='draw', drawing=false, sx=0, sy=0, snapshot=null, history=[];
const BUCKET='chantier-media-v12';

function toast(t){const e=document.getElementById('toast');e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',2500)}
function uid(){return (crypto.randomUUID?crypto.randomUUID():Date.now()+"-"+Math.random().toString(16).slice(2))}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function resetConfig(){localStorage.removeItem('jc_v12_config');location.reload()}

window.addEventListener('load',()=>{
  const saved=localStorage.getItem('jc_v12_config');
  if(saved){try{config=JSON.parse(saved);supabaseUrl.value=config.url||'';supabaseKey.value=config.key||'';chantierCode.value=config.code||'';userName.value=config.name||'';userRole.value=config.role||'';connectApp()}catch(e){}}
});

async function connectApp(){
  config={url:supabaseUrl.value.trim(),key:supabaseKey.value.trim(),code:chantierCode.value.trim()||'CHANTIER',name:userName.value.trim()||'Utilisateur',role:userRole.value.trim()||''};
  if(!config.url||!config.key){toast('URL et clé obligatoires');return}
  localStorage.setItem('jc_v12_config',JSON.stringify(config));
  sb=supabase.createClient(config.url,config.key);
  try{
    let {data,error}=await sb.from('chantiers').select('*').eq('code',config.code).maybeSingle();
    if(error) throw error;
    if(!data){
      const ins=await sb.from('chantiers').insert({code:config.code,name:config.code,created_by:config.name}).select('*').single();
      if(ins.error) throw ins.error; data=ins.data;
    }
    chantierId=data.id;
    headTitle.textContent='Journal de chantier - '+data.name;
    headSub.textContent=config.code+' • '+config.name+(config.role?' • '+config.role:'');
    setup.style.display='none'; main.style.display='flex'; composer.style.display='flex';
    await loadMessages(); subscribeRealtime();
  }catch(e){alert('Erreur connexion Supabase : '+(e.message||e))}
}

async function loadMessages(){
  const {data,error}=await sb.from('chantier_messages').select('*').eq('chantier_id',chantierId).order('created_at',{ascending:true});
  if(error){alert('Erreur lecture messages : '+error.message);return}
  messages=data||[]; renderMessages();
}
function subscribeRealtime(){
  if(channel) sb.removeChannel(channel);
  channel=sb.channel('jc-v12-'+chantierId).on('postgres_changes',{event:'*',schema:'public',table:'chantier_messages',filter:'chantier_id=eq.'+chantierId},loadMessages).subscribe();
}
function renderMessages(){
  const box=document.getElementById('messages'), q=(search.value||'').toLowerCase(), ft=typeFilter.value;
  box.innerHTML=''; let lastDay='';
  const visible=messages.filter(m=>!hiddenIds.has(m.id)).filter(m=>(!ft||m.type===ft)).filter(m=>(!q||String(m.content||'').toLowerCase().includes(q)||String(m.author_name||'').toLowerCase().includes(q)));
  if(!visible.length){box.innerHTML='<div class="day">Aucun message</div>';return}
  for(const m of visible){
    const day=new Date(m.created_at).toLocaleDateString('fr-FR');
    if(day!==lastDay){box.insertAdjacentHTML('beforeend',`<div class="day">${day}</div>`);lastDay=day}
    const mine=m.author_name===config.name;
    const atts=Array.isArray(m.attachments)?m.attachments:[];
    const imgs=atts.filter(a=>a.kind==='image'), files=atts.filter(a=>a.kind!=='image');
    const mediaClass=imgs.length===1?'one':imgs.length===2?'two':'many';
    const imgHtml=imgs.length?`<div class="mediaGrid ${mediaClass}">${imgs.map(a=>`<img class="photo" src="${esc(a.url)}" onclick="openImage('${esc(a.url)}')">`).join('')}</div>`:'';
    const fileHtml=files.map(a=>`<div class="fileCard"><div class="fileIcon">F</div><a href="${esc(a.url)}" target="_blank">${esc(a.name||'Fichier')}</a></div>`).join('');
    const txt=m.deleted_for_all?'<div class="deleted">Message supprimé pour tout le monde</div>':`<div class="txt">${esc(m.content||'')}</div>${imgHtml}${fileHtml}`;
    box.insertAdjacentHTML('beforeend',`
      <div class="msg ${mine?'mine':''}">
        ${mine?'':`<div class="avatar">${esc((m.author_name||'U').slice(0,2).toUpperCase())}</div>`}
        <div class="bubble">
          <div class="meta">${esc(m.author_name||'Utilisateur')} ${m.type?`• ${esc(m.type)}`:''}</div>
          ${txt}
          <div class="time">${new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
          ${!m.deleted_for_all?`<div class="actions"><button class="mini" onclick="deleteForMe('${m.id}')">Supprimer pour moi</button><button class="mini" onclick="deleteForAll('${m.id}')">Supprimer pour tout le monde</button></div>`:''}
        </div>
      </div>`);
  }
  box.scrollTop=box.scrollHeight;
}
function openImage(url){viewerImg.src=url;viewer.style.display='flex'}

function handleFiles(files){
  [...files].forEach(f=>{
    const isImg=f.type.startsWith('image/');
    const item={id:uid(),file:f,kind:isImg?'image':'file',name:f.name,type:f.type,preview:null};
    if(isImg){const r=new FileReader();r.onload=()=>{item.preview=r.result;pendingFiles.push(item);renderPreview()};r.readAsDataURL(f)}
    else {pendingFiles.push(item);renderPreview()}
  });
  fileInput.value='';
}
function renderPreview(){
  previewBar.innerHTML='';
  if(!pendingFiles.length){previewBar.style.display='none';return}
  previewBar.style.display='flex';
  pendingFiles.forEach((p,i)=>{
    const div=document.createElement('div');div.className='previewItem';
    div.innerHTML=p.kind==='image'?`<img src="${p.preview}"><button class="edit">Annoter</button><button class="x">×</button>`:`<div class="fileCard" style="width:180px"><div class="fileIcon">F</div><div>${esc(p.name)}</div><button class="x">×</button></div>`;
    div.querySelector('.x').onclick=()=>{pendingFiles.splice(i,1);renderPreview()};
    const ed=div.querySelector('.edit'); if(ed) ed.onclick=()=>openAnnot(i);
    previewBar.appendChild(div);
  })
}
async function sendMessage(){
  const content=messageText.value.trim();
  if(!content&&!pendingFiles.length){return}
  try{
    const attachments=[];
    for(const p of pendingFiles){
      const ext=(p.name.split('.').pop()||'bin').toLowerCase();
      const path=`${config.code}/${Date.now()}-${uid()}.${ext}`;
      const {error:upErr}=await sb.storage.from(BUCKET).upload(path,p.file,{upsert:false,contentType:p.type||'application/octet-stream'});
      if(upErr) throw upErr;
      const {data:pub}=sb.storage.from(BUCKET).getPublicUrl(path);
      attachments.push({kind:p.kind,name:p.name,type:p.type,url:pub.publicUrl,path});
    }
    const {error}=await sb.from('chantier_messages').insert({chantier_id:chantierId,author_name:config.name,author_role:config.role,type:msgType.value,content,attachments});
    if(error) throw error;
    messageText.value=''; pendingFiles=[]; renderPreview(); await loadMessages();
  }catch(e){alert('Erreur envoi : '+(e.message||e))}
}
function deleteForMe(id){hiddenIds.add(id); renderMessages()}
async function deleteForAll(id){if(!confirm('Supprimer ce message pour tout le monde ?'))return; const {error}=await sb.from('chantier_messages').update({deleted_for_all:true,content:'',attachments:[]}).eq('id',id); if(error) alert(error.message); else loadMessages()}

/* Annotation */
function setTool(t){tool=t}
function openAnnot(i){
  currentAnnotIndex=i; annot.style.display='flex';
  const img=new Image(); img.onload=()=>{const c=canvas, maxW=window.innerWidth, maxH=window.innerHeight-70; let w=img.width,h=img.height,ratio=Math.min(maxW/w,maxH/h,1); c.width=w*ratio;c.height=h*ratio; const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);history=[c.toDataURL()]}
  img.src=pendingFiles[i].preview;
}
function closeAnnot(){annot.style.display='none'}
function undoAnnot(){if(history.length>1){history.pop(); const img=new Image(); img.onload=()=>canvas.getContext('2d').drawImage(img,0,0); img.src=history[history.length-1]}}
function pos(e){const r=canvas.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:t.clientX-r.left,y:t.clientY-r.top}}
canvas.addEventListener('pointerdown',e=>{drawing=true; const p=pos(e); sx=p.x;sy=p.y; snapshot=canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height); if(tool==='text'){const txt=prompt('Texte à ajouter :'); if(txt){drawText(p.x,p.y,txt);saveHist()} drawing=false}});
canvas.addEventListener('pointermove',e=>{if(!drawing)return; const p=pos(e),ctx=canvas.getContext('2d'); if(['rect','circle','arrow'].includes(tool)){ctx.putImageData(snapshot,0,0); drawShape(sx,sy,p.x,p.y,false)} else {drawFree(p.x,p.y)}});
canvas.addEventListener('pointerup',e=>{if(!drawing)return; drawing=false; if(['rect','circle','arrow'].includes(tool)){const p=pos(e); canvas.getContext('2d').putImageData(snapshot,0,0); drawShape(sx,sy,p.x,p.y,true)} saveHist()});
function styleCtx(alpha=1){const ctx=canvas.getContext('2d');ctx.lineWidth=+size.value;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle=color.value;ctx.fillStyle=color.value;ctx.globalAlpha=alpha;return ctx}
function drawFree(x,y){const ctx=styleCtx(tool==='highlight'?.32:1); if(tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20}else ctx.globalCompositeOperation='source-over';ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(x,y);ctx.stroke();sx=x;sy=y;ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1}
function drawText(x,y,t){const ctx=styleCtx();ctx.font='24px Arial';ctx.fillText(t,x,y)}
function drawShape(x1,y1,x2,y2){const ctx=styleCtx(tool==='highlight'?.32:1);ctx.beginPath(); if(tool==='rect'){ctx.strokeRect(x1,y1,x2-x1,y2-y1)} if(tool==='circle'){ctx.ellipse((x1+x2)/2,(y1+y2)/2,Math.abs(x2-x1)/2,Math.abs(y2-y1)/2,0,0,Math.PI*2);ctx.stroke()} if(tool==='arrow'){ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke(); const a=Math.atan2(y2-y1,x2-x1),len=18;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-len*Math.cos(a-Math.PI/6),y2-len*Math.sin(a-Math.PI/6));ctx.lineTo(x2-len*Math.cos(a+Math.PI/6),y2-len*Math.sin(a+Math.PI/6));ctx.closePath();ctx.fill()} ctx.globalAlpha=1}
function saveHist(){history.push(canvas.toDataURL())}
async function saveAnnotation(){
  canvas.toBlob(blob=>{
    const old=pendingFiles[currentAnnotIndex], f=new File([blob],old.name.replace(/\.[^.]+$/,'')+'-annote.png',{type:'image/png'});
    pendingFiles[currentAnnotIndex]={...old,file:f,type:'image/png',name:f.name,preview:canvas.toDataURL('image/png')};
    renderPreview(); closeAnnot();
  },'image/png',.92)
}
</script>
</body>
</html>
