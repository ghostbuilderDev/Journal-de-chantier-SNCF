const SUPABASE_URL='https://mrqxazwipawkdmxwhssr.supabase.co',SUPABASE_KEY='sb_publishable_GVA0gxGRECTC-44666Ev6g_tRXeCPbz',CHANTIER_CODE='CHANTIER-TEST',CHANTIER_NAME='Chantier Test',BUCKET='chantier-media-clean';let sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY),chantierId=null,profile=null,messages=[],pendingFiles=[],replyTo=null,channel=null,typingChannel=null,refreshTimer=null;const $=id=>document.getElementById(id);function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(16).slice(2)}function initials(n){return String(n||'U').split(/\s+/).slice(0,2).map(x=>x[0]||'').join('').toUpperCase()}
window.addEventListener('load',init);$('enterBtn').addEventListener('click',enter);$('resetProfileBtn').addEventListener('click',()=>{localStorage.removeItem('jc_clean_profile');location.reload()});$('printBtn').addEventListener('click',()=>window.print());$('attachBtn').addEventListener('click',()=>$('fileInput').click());$('fileInput').addEventListener('change',e=>handleFiles(e.target.files));$('sendBtn').addEventListener('click',sendMessage);$('messageText').addEventListener('input',()=>{autoGrow();sendTyping()});$('messageText').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});$('searchInput').addEventListener('input',renderMessages);$('typeFilter').addEventListener('change',renderMessages);$('imageModal').addEventListener('click',()=>$('imageModal').style.display='none');document.querySelectorAll('[data-quick]').forEach(b=>b.addEventListener('click',()=>{$('messageType').value=b.dataset.quick;$('messageText').focus()}));
async function init(){const s=localStorage.getItem('jc_clean_profile');if(s){profile=JSON.parse(s);await startApp()}}async function enter(){const name=$('nameInput').value.trim(),role=$('roleInput').value.trim();if(!name){alert('Indique ton nom.');return}profile={name,role};localStorage.setItem('jc_clean_profile',JSON.stringify(profile));await startApp()}async function startApp(){$('login').style.display='none';$('main').style.display='flex';$('composer').style.display='flex';$('subTitle').textContent=CHANTIER_NAME+' • '+profile.name+(profile.role?' • '+profile.role:'');await ensureChantier();await loadMessages();subscribeRealtime();setupTyping();startRefresh()}async function ensureChantier(){let {data,error}=await sb.from('chantiers_clean').select('*').eq('code',CHANTIER_CODE).maybeSingle();if(error)throw error;if(!data){const ins=await sb.from('chantiers_clean').insert({code:CHANTIER_CODE,name:CHANTIER_NAME}).select('*').single();if(ins.error)throw ins.error;data=ins.data}chantierId=data.id}async function loadMessages(){const {data,error}=await sb.from('messages_clean').select('*').eq('chantier_id',chantierId).order('created_at',{ascending:true});if(error){alert('Erreur lecture messages : '+error.message);return}messages=data||[];markRead();renderMessages()}function subscribeRealtime(){if(channel)sb.removeChannel(channel);channel=sb.channel('clean-messages-'+chantierId).on('postgres_changes',{event:'*',schema:'public',table:'messages_clean',filter:'chantier_id=eq.'+chantierId},loadMessages).subscribe()}function startRefresh(){if(refreshTimer)clearInterval(refreshTimer);refreshTimer=setInterval(()=>{if(!document.hidden&&chantierId)loadMessages()},12000)}
function setupTyping(){if(typingChannel)sb.removeChannel(typingChannel);typingChannel=sb.channel('typing-clean-'+chantierId,{config:{broadcast:{self:false}}});typingChannel.on('broadcast',{event:'typing'},p=>{const name=p.payload?.name;if(!name||name===profile.name)return;$('typing').innerHTML=esc(name)+' est en train d’écrire <span></span><span></span><span></span>';$('typing').style.display='block';clearTimeout(window.typingHide);window.typingHide=setTimeout(()=>$('typing').style.display='none',2400)});typingChannel.subscribe()}function sendTyping(){if(!typingChannel||!profile)return;clearTimeout(window.typingSend);window.typingSend=setTimeout(()=>typingChannel.send({type:'broadcast',event:'typing',payload:{name:profile.name}}),180)}
function renderMessages(){const box=$('messages'),q=$('searchInput').value.toLowerCase(),type=$('typeFilter').value;box.innerHTML='';renderPinned();const list=messages.filter(m=>!m.deleted).filter(m=>!type||m.type===type).filter(m=>!q||String(m.content||'').toLowerCase().includes(q)||String(m.author_name||'').toLowerCase().includes(q));if(!list.length){box.innerHTML='<div class="day">Aucun message</div>';return}let lastDay='';list.forEach(m=>{const day=new Date(m.created_at).toLocaleDateString('fr-FR');if(day!==lastDay){box.insertAdjacentHTML('beforeend',`<div class="day">${day}</div>`);lastDay=day}const mine=m.author_name===profile.name,atts=Array.isArray(m.attachments)?m.attachments:[],imgs=atts.filter(a=>a.kind==='image'),files=atts.filter(a=>a.kind!=='image'),reply=m.reply_to?findMessage(m.reply_to):null;const imgHtml=imgs.length?`<div class="media-grid ${imgs.length===1?'one':'multi'}">${imgs.map(a=>`<img class="photo" src="${esc(a.url)}" alt="Photo chantier" data-open-img="${esc(a.url)}">`).join('')}</div>`:'';const fileHtml=files.map(a=>`<a class="file" href="${esc(a.url)}" target="_blank"><span class="file-icon">F</span><span>${esc(a.name||'Fichier')}</span></a>`).join('');const replyHtml=reply?`<div class="reply">↳ Réponse à <b>${esc(reply.author_name)}</b><br>${esc((reply.content||'Photo / fichier').slice(0,90))}</div>`:'';box.insertAdjacentHTML('beforeend',`<article class="msg ${mine?'mine':''}" data-id="${m.id}">${mine?'':`<div class="avatar">${esc(initials(m.author_name))}</div>`}<div class="bubble"><div class="meta"><span>${esc(m.author_name)}</span><span class="type ${esc(m.type)}">${esc(m.type||'Info')}</span></div>${replyHtml}<div class="text">${linkMentions(esc(m.content||''))}</div>${imgHtml}${fileHtml}<div class="reactions">${renderReactions(m)}</div><div class="reads">👁 ${(m.read_by||[]).length} lu</div><div class="time">${new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div><div class="actions"><button class="mini" data-reply="${m.id}">Répondre</button><button class="mini" data-pin="${m.id}">${m.pinned?'Désépingler':'Épingler'}</button><button class="mini" data-react="✅" data-mid="${m.id}">✅</button><button class="mini" data-react="⚠️" data-mid="${m.id}">⚠️</button><button class="mini" data-react="👍" data-mid="${m.id}">👍</button><button class="mini" data-delete="${m.id}">Suppr.</button></div></div></article>`);});box.querySelectorAll('[data-open-img]').forEach(el=>el.addEventListener('click',()=>openImage(el.dataset.openImg)));box.querySelectorAll('[data-reply]').forEach(el=>el.addEventListener('click',()=>setReply(el.dataset.reply)));box.querySelectorAll('[data-pin]').forEach(el=>el.addEventListener('click',()=>togglePin(el.dataset.pin)));box.querySelectorAll('[data-react]').forEach(el=>el.addEventListener('click',()=>react(el.dataset.mid,el.dataset.react)));box.querySelectorAll('[data-delete]').forEach(el=>el.addEventListener('click',()=>deleteMessage(el.dataset.delete)));box.scrollTop=box.scrollHeight}
function renderPinned(){const bar=$('pinned'),pinned=messages.filter(m=>m.pinned&&!m.deleted);if(!pinned.length){bar.style.display='none';bar.innerHTML='';return}bar.style.display='flex';bar.innerHTML=pinned.map(m=>`<div class="pin-card" data-scroll="${m.id}">📌 <b>${esc(m.author_name)}</b><br>${esc((m.content||'Photo / fichier').slice(0,120))}</div>`).join('');bar.querySelectorAll('[data-scroll]').forEach(el=>el.addEventListener('click',()=>scrollToMessage(el.dataset.scroll)))}function renderReactions(m){const r=m.reactions||{};return Object.keys(r).filter(k=>Array.isArray(r[k])&&r[k].length).map(k=>`<button class="reaction" data-react="${k}" data-mid="${m.id}">${k} ${r[k].length}</button>`).join('')}function linkMentions(html){return html.replace(/@([A-Za-zÀ-ÿ0-9_-]+)/g,'<b style="color:var(--sncf)">@$1</b>')}function findMessage(id){return messages.find(m=>m.id===id)}function setReply(id){replyTo=findMessage(id);const box=$('replyPreview');if(!replyTo)return;box.innerHTML=`<button type="button" id="cancelReply">×</button><b>Réponse à ${esc(replyTo.author_name)}</b><br>${esc((replyTo.content||'Photo / fichier').slice(0,120))}`;box.style.display='block';$('cancelReply').addEventListener('click',()=>{replyTo=null;box.style.display='none'});$('messageText').focus()}async function togglePin(id){const m=findMessage(id);if(!m)return;const {error}=await sb.from('messages_clean').update({pinned:!m.pinned}).eq('id',id);if(error)alert(error.message);else loadMessages()}async function react(id,emoji){const {data:m,error}=await sb.from('messages_clean').select('reactions').eq('id',id).single();if(error){alert(error.message);return}const r=m.reactions||{},arr=Array.isArray(r[emoji])?r[emoji]:[];r[emoji]=arr.includes(profile.name)?arr.filter(x=>x!==profile.name):[...arr,profile.name];const up=await sb.from('messages_clean').update({reactions:r}).eq('id',id);if(up.error)alert(up.error.message);else loadMessages()}async function markRead(){for(const m of messages.slice(-30)){const read=Array.isArray(m.read_by)?m.read_by:[];if(!read.includes(profile.name))await sb.from('messages_clean').update({read_by:[...read,profile.name]}).eq('id',m.id)}}function scrollToMessage(id){const el=document.querySelector(`[data-id="${id}"]`);if(!el)return;el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='3px solid #f2a900';setTimeout(()=>el.style.outline='',1400)}function openImage(url){$('modalImg').src=url;$('imageModal').style.display='flex'}
function handleFiles(files){[...files].forEach(f=>{const item={file:f,kind:f.type.startsWith('image/')?'image':'file',name:f.name,type:f.type,preview:null};if(item.kind==='image'){const r=new FileReader();r.onload=()=>{item.preview=r.result;pendingFiles.push(item);renderPreview()};r.readAsDataURL(f)}else{pendingFiles.push(item);renderPreview()}});$('fileInput').value=''}function renderPreview(){const box=$('preview');box.innerHTML='';if(!pendingFiles.length){box.style.display='none';return}box.style.display='flex';pendingFiles.forEach((p,i)=>{const div=document.createElement('div');div.className='preview-item';div.innerHTML=p.kind==='image'?`<img src="${p.preview}" alt=""><button type="button">×</button>`:`<div class="file"><span class="file-icon">F</span><span>${esc(p.name)}</span></div><button type="button">×</button>`;div.querySelector('button').addEventListener('click',()=>{pendingFiles.splice(i,1);renderPreview()});box.appendChild(div)})}async function sendMessage(){const content=$('messageText').value.trim();if(!content&&!pendingFiles.length)return;const attachments=[];for(const p of pendingFiles){const ext=(p.name.split('.').pop()||'bin').toLowerCase(),path=`${CHANTIER_CODE}/${Date.now()}-${uid()}.${ext}`;const up=await sb.storage.from(BUCKET).upload(path,p.file,{contentType:p.type||'application/octet-stream'});if(up.error){alert('Erreur fichier : '+up.error.message);return}const {data:pub}=sb.storage.from(BUCKET).getPublicUrl(path);attachments.push({kind:p.kind,name:p.name,type:p.type,url:pub.publicUrl,path})}const {error}=await sb.from('messages_clean').insert({chantier_id:chantierId,author_name:profile.name,author_role:profile.role||'',type:$('messageType').value,content,attachments,reply_to:replyTo?replyTo.id:null,mentions:extractMentions(content),read_by:[profile.name],reactions:{}});if(error){alert('Erreur envoi : '+error.message);return}$('messageText').value='';pendingFiles=[];replyTo=null;$('replyPreview').style.display='none';renderPreview();autoGrow();loadMessages()}function extractMentions(text){return [...new Set((String(text).match(/@([A-Za-zÀ-ÿ0-9_-]+)/g)||[]).map(x=>x.slice(1)))]}async function deleteMessage(id){if(!confirm('Supprimer ce message pour tout le monde ?'))return;const {error}=await sb.from('messages_clean').update({deleted:true}).eq('id',id);if(error)alert(error.message);else loadMessages()}function autoGrow(){const el=$('messageText');el.style.height='44px';el.style.height=Math.min(el.scrollHeight,116)+'px'}
