<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Journal de chantier sécurisé</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="./manifest.json"><meta name="theme-color" content="#82005F">
<style>
:root{--sncf:#82005f;--sncf2:#a1006b;--green:#00a88f;--bg:#edf6f8;--line:#d7e3e7;--muted:#65737c;--mine:#dcf8ec;--shadow:0 12px 28px rgba(0,0,0,.15)}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Arial;background:var(--bg);overflow:hidden;color:#18242b}button,input,textarea,select{font:inherit}button{cursor:pointer}
.header{height:64px;background:linear-gradient(135deg,var(--sncf),var(--sncf2));color:white;display:flex;gap:10px;align-items:center;padding:12px 14px;box-shadow:0 5px 18px rgba(0,0,0,.2)}.logo{width:42px;height:42px;border-radius:15px;background:white;color:var(--sncf);display:grid;place-items:center;font-weight:900}.title{flex:1;min-width:0}.title h1{margin:0;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title p{margin:2px 0 0;font-size:12px;opacity:.9}.topbtn{border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.16);color:white;border-radius:999px;padding:8px 10px;font-weight:800}
.page{height:calc(100vh - 64px);overflow:auto;padding:16px 12px}.card{background:white;border-radius:22px;padding:16px;box-shadow:var(--shadow);max-width:850px;margin:0 auto 12px}.card h2{margin:0 0 8px;color:var(--sncf)}.muted{font-size:13px;color:var(--muted);line-height:1.4}
label{display:block;font-size:12px;font-weight:800;color:#52636b;margin:10px 0 5px}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#f9fcfd}.btn{border:0;border-radius:15px;padding:12px 14px;font-weight:900;background:var(--green);color:white;width:100%;margin-top:10px}.btn2{background:#eef5f7;color:#26333a}.danger{background:#d32f2f}
.auth-tabs{display:flex;gap:8px;background:#eef5f7;border-radius:16px;padding:5px;margin:12px 0}.auth-tab{flex:1;border:0;border-radius:13px;padding:10px;background:transparent;font-weight:900}.auth-tab.active{background:white;color:var(--sncf);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.chantier{width:100%;border:0;background:white;border-radius:18px;padding:14px;text-align:left;box-shadow:0 5px 15px rgba(0,0,0,.1);margin:8px 0;display:flex;gap:12px;align-items:center}.ci{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--sncf),var(--sncf2));color:white;display:grid;place-items:center;font-weight:900}.cn{font-weight:900;font-size:16px}.cc{font-size:12px;color:var(--muted);margin-top:3px}
.main{height:calc(100vh - 64px);display:none;flex-direction:column}.tabs{display:flex;gap:7px;padding:8px;background:white;border-bottom:1px solid var(--line)}.tab{flex:1;border:0;border-radius:13px;padding:9px;font-weight:900;background:#eef4f5}.tab.active{background:var(--sncf);color:white}
.tools{display:flex;gap:7px;overflow:auto;padding:8px 10px;background:rgba(255,255,255,.85);border-bottom:1px solid var(--line)}.tools>*{white-space:nowrap;border:1px solid var(--line);background:white;border-radius:999px;padding:8px 10px}.tools input{min-width:170px}
.messages{flex:1;overflow:auto;padding:14px 10px 104px;background:linear-gradient(180deg,#eaf5f7,#dcecef)}.day{display:table;margin:8px auto 14px;background:white;color:#53616b;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:900}.msg{display:flex;margin:9px 0;gap:8px;align-items:flex-end}.msg.mine{justify-content:flex-end}.avatar{width:32px;height:32px;border-radius:50%;background:var(--sncf);color:white;display:grid;place-items:center;font-size:12px;font-weight:900}.bubble{max-width:78%;background:white;border-radius:19px 19px 19px 5px;padding:10px 12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}.mine .bubble{background:var(--mine);border-radius:19px 19px 5px 19px}.meta{font-size:11px;color:var(--sncf);font-weight:900;margin-bottom:5px}.type{border-radius:999px;padding:2px 7px;background:rgba(130,0,95,.09)}.text{white-space:pre-wrap;line-height:1.42;font-size:15px}.time{font-size:10px;color:#70808a;text-align:right;margin-top:4px}.photo{width:100%;max-height:360px;object-fit:cover;border-radius:14px;margin-top:7px}.file{display:block;padding:10px;border:1px solid var(--line);border-radius:14px;margin-top:7px;background:#fff;text-decoration:none;color:#18242b;font-weight:800}.mini{border:0;border-radius:999px;background:rgba(0,0,0,.06);padding:4px 8px;font-size:11px;margin:2px}.reaction{border-radius:999px;background:rgba(130,0,95,.08);padding:2px 7px;font-size:11px;margin-right:4px}
.panel{display:none;flex:1;overflow:auto;padding:14px;background:#eef6f8}.user-row{display:flex;justify-content:space-between;gap:8px;background:white;border:1px solid var(--line);border-radius:16px;padding:10px;margin:8px 0}.badge{border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;background:#eef4f5}
.composer{position:fixed;left:0;right:0;bottom:0;background:#f8fcfd;border-top:1px solid var(--line);padding:8px;display:none;gap:7px;align-items:flex-end;z-index:20}.round{width:44px;height:44px;border:0;border-radius:50%;background:white;box-shadow:0 2px 8px rgba(0,0,0,.13);color:var(--sncf);font-size:22px}.composer textarea{flex:1;height:44px;max-height:116px;resize:none;border-radius:22px}.send{width:46px;height:46px;border:0;border-radius:50%;background:var(--green);color:white;font-weight:900}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:40;display:none;align-items:center;justify-content:center}.modal img{max-width:96vw;max-height:90vh;border-radius:12px}
</style></head><body>
<header class="header"><div class="logo">JC</div><div class="title"><h1>Journal de chantier sécurisé</h1><p id="subTitle">Configuration multi-chantiers</p></div><button id="backBtn" class="topbtn" style="display:none">Chantiers</button><button id="logoutBtn" class="topbtn" style="display:none">Sortir</button></header>

<section id="authPage" class="page">
<div class="card"><h2>Connexion</h2><p class="muted">Connexion simple par email ou téléphone.</p>
<div class="auth-tabs"><button id="emailTab" class="auth-tab active">Email</button><button id="phoneTab" class="auth-tab">Téléphone</button></div>
<div id="emailAuth"><label>Email</label><input id="email" type="email" placeholder="prenom.nom@entreprise.fr"><button id="emailOtpBtn" class="btn">Recevoir un lien de connexion</button></div>
<div id="phoneAuth" style="display:none"><label>Téléphone</label><input id="phone" placeholder="+33612345678"><button id="sendSmsBtn" class="btn">Recevoir un code SMS</button><label>Code SMS</label><input id="phoneOtp"><button id="verifySmsBtn" class="btn btn2">Valider le code</button></div>
<hr style="border:0;border-top:1px solid var(--line);margin:18px 0"><h2>Mon profil</h2><label>Nom complet</label><input id="fullName"><label>Entreprise / rôle</label><input id="roleText">
</div></section>

<section id="homePage" class="page" style="display:none">
<div class="card"><h2>Mes chantiers</h2><p class="muted">Chaque chantier possède son propre fil d’actualité.</p><div id="chantierList"></div></div>
<div class="card"><h2>Créer un chantier</h2><label>Nom</label><input id="newChantierName" placeholder="Ex : Samois"><label>Code</label><input id="newChantierCode" placeholder="SAMOIS-2026"><label>Description</label><textarea id="newChantierDesc" rows="3"></textarea><button id="createChantierBtn" class="btn">Créer le chantier</button></div>
</section>

<section id="pendingPage" class="page" style="display:none"><div class="card"><h2>Accès en attente</h2><p class="muted">Un administrateur doit valider ton accès au chantier.</p><button id="refreshPendingBtn" class="btn">Vérifier à nouveau</button><button id="returnHomeBtn" class="btn btn2">Retour aux chantiers</button></div></section>

<section id="main" class="main">
<div class="tabs"><button id="tabFeed" class="tab active">Fil</button><button id="tabConfig" class="tab">Config</button><button id="tabAdmin" class="tab">Accès</button><button id="tabMeetings" class="tab">Réunions</button></div>
<div id="feedZone" style="display:flex;flex-direction:column;flex:1;min-height:0"><div class="tools"><input id="searchInput" placeholder="Rechercher"><select id="typeFilter"><option value="">Tous</option><option>Info</option><option>Sécurité</option><option>Travaux</option><option>Incident</option><option>Décision</option><option>Photo</option></select><button data-quick="Sécurité">⚠️ Sécurité</button><button data-quick="Travaux">🚧 Travaux</button><button data-quick="Incident">⛔ Incident</button></div><main id="messages" class="messages"></main></div>
<div id="configPanel" class="panel"></div><div id="adminPanel" class="panel"></div><div id="meetingsPanel" class="panel"></div>
</section>

<div id="composer" class="composer"><button id="attachBtn" class="round">＋</button><input id="fileInput" type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" multiple hidden><textarea id="messageText" placeholder="Message"></textarea><select id="messageType" style="width:92px;border-radius:22px"><option>Info</option><option>Sécurité</option><option>Travaux</option><option>Incident</option><option>Décision</option><option>Photo</option></select><button id="sendBtn" class="send">➤</button></div>
<div id="imageModal" class="modal"><img id="modalImg"></div>
<script>
const SUPABASE_URL="https://mrqxazwipawkdmxwhssr.supabase.co", SUPABASE_KEY="sb_publishable_GVA0gxGRECTC-44666Ev6g_tRXeCPbz", BUCKET="chantier-secure-media";
let sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY), user=null, profile=null, chantier=null, membership=null, messages=[], pendingFiles=[], channel=null, refreshTimer=null;
const $=id=>document.getElementById(id), ROLES={super_admin:5,admin_chantier:4,animateur:3,contributeur:2,lecteur:1};
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function initials(n){return String(n||"U").split(/\s+/).slice(0,2).map(x=>x[0]||"").join("").toUpperCase()}
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+"-"+Math.random().toString(16).slice(2)} function can(r){return membership&&ROLES[membership.role]>=ROLES[r]}
window.onload=init;
emailTab.onclick=()=>setAuth("email"); phoneTab.onclick=()=>setAuth("phone"); emailOtpBtn.onclick=emailOtp; sendSmsBtn.onclick=sendSms; verifySmsBtn.onclick=verifySms; logoutBtn.onclick=logout; backBtn.onclick=showHome; createChantierBtn.onclick=createChantier; refreshPendingBtn.onclick=()=>openChantier(chantier.id); returnHomeBtn.onclick=showHome;
attachBtn.onclick=()=>fileInput.click(); fileInput.onchange=e=>handleFiles(e.target.files); sendBtn.onclick=sendMessage; messageText.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}}; searchInput.oninput=renderMessages; typeFilter.onchange=renderMessages; imageModal.onclick=()=>imageModal.style.display="none";
tabFeed.onclick=()=>showTab("feed"); tabConfig.onclick=()=>showTab("config"); tabAdmin.onclick=()=>showTab("admin"); tabMeetings.onclick=()=>showTab("meetings"); document.querySelectorAll("[data-quick]").forEach(b=>b.onclick=()=>{messageType.value=b.dataset.quick;messageText.focus()});
function setAuth(m){emailAuth.style.display=m==="email"?"block":"none";phoneAuth.style.display=m==="phone"?"block":"none";emailTab.classList.toggle("active",m==="email");phoneTab.classList.toggle("active",m==="phone")}
async function init(){const res=await sb.auth.getSession();if(res.data.session)await bootstrap();sb.auth.onAuthStateChange(async(_,s)=>{if(s)await bootstrap();else showAuth()})}
function draft(){return {full_name:fullName.value.trim(),role_text:roleText.value.trim()}}
async function emailOtp(){if(!email.value.trim())return alert("Indique ton email");localStorage.setItem("jc_profile_draft",JSON.stringify(draft()));const r=await sb.auth.signInWithOtp({email:email.value.trim(),options:{shouldCreateUser:true,emailRedirectTo:location.href}});alert(r.error?r.error.message:"Lien envoyé par email")}
async function sendSms(){if(!phone.value.trim())return alert("Indique ton téléphone");localStorage.setItem("jc_profile_draft",JSON.stringify(draft()));const r=await sb.auth.signInWithOtp({phone:phone.value.trim()});alert(r.error?"SMS non envoyé : "+r.error.message:"Code SMS envoyé")}
async function verifySms(){const r=await sb.auth.verifyOtp({phone:phone.value.trim(),token:phoneOtp.value.trim(),type:"sms"});if(r.error)alert(r.error.message)}
async function logout(){await sb.auth.signOut();location.reload()}
function showAuth(){authPage.style.display="block";homePage.style.display="none";pendingPage.style.display="none";main.style.display="none";composer.style.display="none";logoutBtn.style.display="none";backBtn.style.display="none"}
async function bootstrap(){user=(await sb.auth.getUser()).data.user;if(!user)return showAuth();await ensureProfile();authPage.style.display="none";logoutBtn.style.display="inline-block";await showHome()}
async function ensureProfile(){const d=JSON.parse(localStorage.getItem("jc_profile_draft")||"{}");let r=await sb.from("secure_profiles").select("*").eq("id",user.id).maybeSingle();if(!r.data)r=await sb.from("secure_profiles").insert({id:user.id,full_name:d.full_name||user.email||user.phone||"Utilisateur",role_text:d.role_text||"",email:user.email,phone:user.phone}).select("*").single();profile=r.data}
async function showHome(){stop();authPage.style.display="none";pendingPage.style.display="none";main.style.display="none";composer.style.display="none";homePage.style.display="block";backBtn.style.display="none";subTitle.textContent="Mes chantiers • "+(profile?.full_name||"");await loadChantiers()}
function stop(){if(channel)sb.removeChannel(channel);if(refreshTimer)clearInterval(refreshTimer);channel=null;refreshTimer=null;chantier=null;membership=null}
async function loadChantiers(){const r=await sb.from("secure_chantiers").select("*").order("created_at",{ascending:false});if(r.error)return alert(r.error.message);chantierList.innerHTML="";(r.data||[]).forEach(c=>chantierList.innerHTML+=`<button class="chantier" data-open="${c.id}"><div class="ci">${esc(String(c.name).slice(0,2).toUpperCase())}</div><div><div class="cn">${esc(c.name)}</div><div class="cc">${esc(c.code)}${c.description?" • "+esc(c.description).slice(0,80):""}</div></div></button>`);chantierList.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openChantier(b.dataset.open))}
async function createChantier(){const name=newChantierName.value.trim(),code=newChantierCode.value.trim().toUpperCase(),description=newChantierDesc.value.trim();if(!name||!code)return alert("Nom et code obligatoires");const r=await sb.from("secure_chantiers").insert({name,code,description,created_by:user.id}).select("*").single();if(r.error)return alert(r.error.message);await sb.from("secure_members").insert({chantier_id:r.data.id,user_id:user.id,role:"admin_chantier",status:"approved"});openChantier(r.data.id)}
async function openChantier(id){const r=await sb.from("secure_chantiers").select("*").eq("id",id).single();if(r.error)return alert(r.error.message);chantier=r.data;membership=await getMembership();if(!membership||membership.status!=="approved"){homePage.style.display="none";pendingPage.style.display="block";backBtn.style.display="inline-block";return}homePage.style.display="none";pendingPage.style.display="none";main.style.display="flex";composer.style.display=can("contributeur")?"flex":"none";backBtn.style.display="inline-block";subTitle.textContent=chantier.name+" • "+profile.full_name+" • "+membership.role;await loadMessages();subscribeRealtime();startRefresh()}
async function getMembership(){let r=await sb.from("secure_members").select("*").eq("chantier_id",chantier.id).eq("user_id",user.id).maybeSingle();if(r.data)return r.data;const cnt=await sb.from("secure_members").select("*",{count:"exact",head:true}).eq("chantier_id",chantier.id).eq("status","approved");const first=(cnt.count||0)===0;const ins=await sb.from("secure_members").insert({chantier_id:chantier.id,user_id:user.id,role:first?"admin_chantier":"lecteur",status:first?"approved":"pending"}).select("*").single();return ins.data}
async function loadMessages(){const r=await sb.from("secure_messages").select("*, secure_profiles(full_name,role_text)").eq("chantier_id",chantier.id).eq("deleted",false).order("created_at",{ascending:true});if(r.error)return alert(r.error.message);messages=r.data||[];renderMessages()}
function subscribeRealtime(){if(channel)sb.removeChannel(channel);channel=sb.channel("feed-"+chantier.id).on("postgres_changes",{event:"*",schema:"public",table:"secure_messages",filter:"chantier_id=eq."+chantier.id},loadMessages).on("postgres_changes",{event:"*",schema:"public",table:"secure_members",filter:"chantier_id=eq."+chantier.id},async()=>{membership=await getMembership();if(adminPanel.style.display==="block")renderAdmin()}).subscribe()}
function startRefresh(){if(refreshTimer)clearInterval(refreshTimer);refreshTimer=setInterval(()=>{if(!document.hidden&&chantier)loadMessages()},12000)}
function showTab(t){feedZone.style.display=t==="feed"?"flex":"none";configPanel.style.display=t==="config"?"block":"none";adminPanel.style.display=t==="admin"?"block":"none";meetingsPanel.style.display=t==="meetings"?"block":"none";composer.style.display=t==="feed"&&can("contributeur")?"flex":"none";tabFeed.classList.toggle("active",t==="feed");tabConfig.classList.toggle("active",t==="config");tabAdmin.classList.toggle("active",t==="admin");tabMeetings.classList.toggle("active",t==="meetings");if(t==="config")renderConfig();if(t==="admin")renderAdmin();if(t==="meetings")renderMeetings()}
function renderMessages(){messagesEl=messages;const box=document.getElementById("messages");const q=searchInput.value.toLowerCase(),type=typeFilter.value;box.innerHTML="";const list=messagesEl.filter(m=>(!type||m.type===type)).filter(m=>!q||String(m.content||"").toLowerCase().includes(q)||String(m.secure_profiles?.full_name||"").toLowerCase().includes(q));if(!list.length){box.innerHTML='<div class="day">Aucun message</div>';return}let day="";list.forEach(m=>{const d=new Date(m.created_at).toLocaleDateString("fr-FR");if(d!==day){box.innerHTML+=`<div class="day">${d}</div>`;day=d}const author=m.secure_profiles?.full_name||"Utilisateur",mine=m.user_id===user.id,atts=Array.isArray(m.attachments)?m.attachments:[];const media=atts.map(a=>a.kind==="image"?`<img class="photo" src="${esc(a.url)}" data-img="${esc(a.url)}">`:`<a class="file" href="${esc(a.url)}" target="_blank">📎 ${esc(a.name||"Fichier")}</a>`).join("");box.innerHTML+=`<article class="msg ${mine?"mine":""}">${mine?"":`<div class="avatar">${esc(initials(author))}</div>`}<div class="bubble"><div class="meta">${esc(author)} <span class="type">${esc(m.type||"Info")}</span></div><div class="text">${esc(m.content||"")}</div>${media}<div>${renderReactions(m)}</div><div class="time">${new Date(m.created_at).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</div><button class="mini" data-react="✅" data-id="${m.id}">✅</button><button class="mini" data-react="⚠️" data-id="${m.id}">⚠️</button><button class="mini" data-react="👍" data-id="${m.id}">👍</button>${can("animateur")?`<button class="mini" data-del="${m.id}">Suppr.</button>`:""}</div></article>`});box.querySelectorAll("[data-img]").forEach(e=>e.onclick=()=>{modalImg.src=e.dataset.img;imageModal.style.display="flex"});box.querySelectorAll("[data-react]").forEach(e=>e.onclick=()=>react(e.dataset.id,e.dataset.react));box.querySelectorAll("[data-del]").forEach(e=>e.onclick=()=>deleteMessage(e.dataset.del));box.scrollTop=box.scrollHeight}
function renderReactions(m){const r=m.reactions||{};return Object.keys(r).filter(k=>Array.isArray(r[k])&&r[k].length).map(k=>`<span class="reaction">${k} ${r[k].length}</span>`).join("")}
async function react(id,emoji){const r=await sb.from("secure_messages").select("reactions").eq("id",id).single();if(r.error)return alert(r.error.message);const obj=r.data.reactions||{},arr=Array.isArray(obj[emoji])?obj[emoji]:[];obj[emoji]=arr.includes(profile.full_name)?arr.filter(x=>x!==profile.full_name):[...arr,profile.full_name];const up=await sb.from("secure_messages").update({reactions:obj}).eq("id",id);if(up.error)alert(up.error.message);else loadMessages()}
function handleFiles(files){[...files].forEach(f=>pendingFiles.push({file:f,kind:f.type.startsWith("image/")?"image":"file",name:f.name,type:f.type}));alert(pendingFiles.length+" fichier(s) prêt(s)");fileInput.value=""}
async function sendMessage(){if(!can("contributeur"))return alert("Droit contributeur nécessaire");const content=messageText.value.trim();if(!content&&!pendingFiles.length)return;const attachments=[];for(const p of pendingFiles){const path=`${chantier.code}/${Date.now()}-${uid()}-${p.name}`;const up=await sb.storage.from(BUCKET).upload(path,p.file,{contentType:p.type||"application/octet-stream"});if(up.error)return alert(up.error.message);const pub=sb.storage.from(BUCKET).getPublicUrl(path).data;attachments.push({kind:p.kind,name:p.name,type:p.type,url:pub.publicUrl,path})}const ins=await sb.from("secure_messages").insert({chantier_id:chantier.id,user_id:user.id,type:messageType.value,content,attachments,reactions:{}});if(ins.error)return alert(ins.error.message);messageText.value="";pendingFiles=[];loadMessages()}
async function deleteMessage(id){if(!can("animateur"))return;if(!confirm("Supprimer ce message ?"))return;const up=await sb.from("secure_messages").update({deleted:true}).eq("id",id);if(up.error)alert(up.error.message);else loadMessages()}
function renderConfig(){if(!can("admin_chantier")){configPanel.innerHTML='<div class="card"><h2>Configuration</h2><p class="muted">Droits insuffisants.</p></div>';return}configPanel.innerHTML=`<div class="card"><h2>Configuration du chantier</h2><label>Nom</label><input id="cfgName" value="${esc(chantier.name)}"><label>Code</label><input id="cfgCode" value="${esc(chantier.code)}"><label>Description</label><textarea id="cfgDesc" rows="4">${esc(chantier.description||"")}</textarea><button id="saveCfg" class="btn">Enregistrer</button><button id="resetFeed" class="btn btn2">Réinitialiser le fil</button><button id="deleteChantier" class="btn danger">Supprimer le chantier</button></div>`;saveCfg.onclick=saveConfig;resetFeed.onclick=resetFeedFn;deleteChantier.onclick=deleteChantierFn}
async function saveConfig(){const patch={name:cfgName.value.trim(),code:cfgCode.value.trim().toUpperCase(),description:cfgDesc.value.trim()};const r=await sb.from("secure_chantiers").update(patch).eq("id",chantier.id);if(r.error)return alert(r.error.message);Object.assign(chantier,patch);alert("Configuration enregistrée")}
async function resetFeedFn(){if(confirm("Réinitialiser le fil ?")){await sb.from("secure_messages").delete().eq("chantier_id",chantier.id);loadMessages()}}
async function deleteChantierFn(){if(confirm("Supprimer le chantier complet ?")){await sb.from("secure_chantiers").delete().eq("id",chantier.id);showHome()}}
async function renderAdmin(){if(!can("admin_chantier")){adminPanel.innerHTML='<div class="card"><h2>Accès</h2><p class="muted">Droits insuffisants.</p></div>';return}const r=await sb.from("secure_members").select("*, secure_profiles(full_name,email,phone,role_text)").eq("chantier_id",chantier.id).order("created_at");if(r.error)return alert(r.error.message);adminPanel.innerHTML=`<div class="card"><h2>Accès au chantier</h2>${r.data.map(m=>`<div class="user-row"><div><b>${esc(m.secure_profiles?.full_name||"Utilisateur")}</b><br><span class="muted">${esc(m.secure_profiles?.email||m.secure_profiles?.phone||"")}</span><br><span class="badge">${esc(m.role)}</span> <span class="badge">${esc(m.status)}</span></div><div><select data-role="${m.id}"><option ${m.role==="lecteur"?"selected":""}>lecteur</option><option ${m.role==="contributeur"?"selected":""}>contributeur</option><option ${m.role==="animateur"?"selected":""}>animateur</option><option ${m.role==="admin_chantier"?"selected":""}>admin_chantier</option><option ${m.role==="super_admin"?"selected":""}>super_admin</option></select><button class="mini" data-approve="${m.id}">Accepter</button><button class="mini" data-save="${m.id}">Rôle</button><button class="mini" data-remove="${m.id}">Retirer</button></div></div>`).join("")}</div>`;adminPanel.querySelectorAll("[data-approve]").forEach(b=>b.onclick=()=>updateMember(b.dataset.approve,{status:"approved"}));adminPanel.querySelectorAll("[data-save]").forEach(b=>b.onclick=()=>{const sel=adminPanel.querySelector(`[data-role="${b.dataset.save}"]`);updateMember(b.dataset.save,{role:sel.value,status:"approved"})});adminPanel.querySelectorAll("[data-remove]").forEach(b=>b.onclick=()=>updateMember(b.dataset.remove,{status:"rejected"}))}
async function updateMember(id,patch){const r=await sb.from("secure_members").update(patch).eq("id",id);if(r.error)alert(r.error.message);else renderAdmin()}
function renderMeetings(){meetingsPanel.innerHTML='<div class="card"><h2>Réunions chantier</h2><p class="muted">Module prévu chantier par chantier : ordre du jour, lien Teams/Meet et compte rendu.</p></div>'}
</script></body></html>
