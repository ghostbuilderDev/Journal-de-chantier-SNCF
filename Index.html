<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Journal de chantier SNCF - V9 Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--sncf-purple:#6E1E78;--sncf-dark:#35104a;--sncf-red:#D52B1E;--sncf-orange:#F39200;--sncf-blue:#0088CE;--sncf-green:#00A88F;--wa:#128C7E;--bubble:#dcf8c6;--bg:#edf1f5;--ink:#142033;--muted:#667085;--line:#d9e0ea;--shadow:0 18px 55px rgba(31,20,54,.18)}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,rgba(110,30,120,.18),transparent 34%),radial-gradient(circle at bottom right,rgba(0,136,206,.14),transparent 38%),var(--bg);color:var(--ink)}button,input,textarea,select{font:inherit}.app{height:100vh;padding:12px;display:grid;grid-template-columns:340px 1fr;gap:12px}.side{border-radius:28px;background:linear-gradient(160deg,var(--sncf-dark),var(--sncf-purple) 60%,#8b247d);color:white;box-shadow:var(--shadow);padding:18px;overflow:auto}.side h1{margin:0 0 5px;font-size:25px}.side p{margin:0 0 15px;color:rgba(255,255,255,.76);font-size:13px;line-height:1.4}.box{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);border-radius:22px;padding:13px;margin:0 0 12px}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}.field label{font-size:12px;font-weight:900;color:rgba(255,255,255,.84)}input,textarea,select{border:1px solid var(--line);border-radius:14px;padding:11px 12px;background:white;outline:none}input:focus,textarea:focus,select:focus{border-color:var(--sncf-blue);box-shadow:0 0 0 4px rgba(0,136,206,.15)}.btn{border:0;border-radius:14px;padding:11px 13px;font-weight:950;cursor:pointer;color:white;background:linear-gradient(135deg,var(--sncf-red),#e85a43);box-shadow:0 9px 18px rgba(213,43,30,.22)}.btn.secondary{background:rgba(255,255,255,.92);color:var(--sncf-dark);box-shadow:none}.btn.ok{background:linear-gradient(135deg,var(--sncf-green),#00c7a7)}.btn.small{padding:7px 9px;border-radius:10px;font-size:12px}.btn.ghost{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);box-shadow:none}.status{padding:8px 10px;border-radius:14px;background:rgba(255,255,255,.12);font-size:12px;line-height:1.35}.main{height:calc(100vh - 24px);background:white;border-radius:28px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}.head{height:70px;background:linear-gradient(135deg,var(--sncf-dark),var(--sncf-purple));color:white;display:flex;align-items:center;justify-content:space-between;padding:10px 14px}.id{display:flex;align-items:center;gap:12px;min-width:0}.avatar{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--sncf-red),var(--sncf-orange));font-weight:1000}.title{min-width:0}.title h2{margin:0;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:12px;color:rgba(255,255,255,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.feed{flex:1;overflow:auto;padding:18px;background:#efe8df;background-image:linear-gradient(rgba(255,255,255,.68),rgba(255,255,255,.68)),radial-gradient(circle at 1px 1px,rgba(110,30,120,.10) 1px,transparent 0);background-size:auto,22px 22px;display:flex;flex-direction:column;gap:10px}.empty{margin:auto;text-align:center;background:rgba(255,255,255,.88);border:1px dashed #c5cede;border-radius:20px;padding:28px;color:#667085;max-width:430px}.day{align-self:center;background:rgba(255,255,255,.9);border:1px solid #d8deea;border-radius:999px;padding:6px 12px;font-size:12px;color:#556270;font-weight:900}.bubble{position:relative;max-width:min(720px,88%);align-self:flex-start;background:#fff;border-radius:9px;padding:7px 8px 6px;box-shadow:0 2px 8px rgba(16,24,40,.12)}.bubble.me{align-self:flex-end;background:var(--bubble)}.bubble:before{content:"";position:absolute;top:0;left:-8px;border-top:10px solid #fff;border-left:10px solid transparent}.bubble.me:before{left:auto;right:-8px;border-left:0;border-right:10px solid transparent;border-top-color:var(--bubble)}.who{display:flex;gap:7px;align-items:center;margin-bottom:4px}.author{font-weight:950;font-size:13px;color:var(--sncf-purple)}.tag{font-size:10px;font-weight:950;border-radius:999px;padding:3px 7px;background:#eef4ff;color:#005b96;text-transform:uppercase}.tag.secu{background:#fff1dd;color:#9a5200}.tag.alea{background:#ffe8e5;color:#a5221a}.tag.ok{background:#e5faf6;color:#027363}.msg{font-size:15px;line-height:1.36;white-space:pre-wrap;padding:1px 2px}.deleted{font-style:italic;color:#667085}.time{font-size:11px;color:#667085;text-align:right;margin-top:3px;padding-left:40px}.media{display:grid;gap:4px;margin-bottom:6px;max-width:430px}.media.one{grid-template-columns:1fr}.media.multi{grid-template-columns:1fr 1fr}.photo{overflow:hidden;border-radius:8px;background:#111;cursor:pointer}.photo img{width:100%;height:100%;max-height:330px;object-fit:cover;display:block}.media.one .photo img{object-fit:contain;max-height:430px}.doc{display:flex;gap:10px;align-items:center;background:#f7f8fb;border:1px solid #e4e8f0;border-radius:10px;padding:9px;margin:5px 0;max-width:430px}.doci{width:38px;height:44px;border-radius:8px;display:grid;place-items:center;background:linear-gradient(135deg,var(--sncf-purple),var(--sncf-blue));color:white}.doc a{font-size:12px;color:var(--sncf-purple);font-weight:900;text-decoration:none}.docname{font-size:13px;font-weight:900;word-break:break-word}.actions{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}.actions button{border:0;border-radius:10px;padding:6px 8px;font-size:12px;font-weight:900;cursor:pointer;background:#eef2f7;color:#344054}.actions .danger{background:#ffe4e1;color:#a5221a}.composer{background:#f0f2f5;border-top:1px solid #d9dee8;padding:7px 8px calc(7px + env(safe-area-inset-bottom))}.metaPanel{display:none;grid-template-columns:1fr 130px 120px;gap:7px;background:#fff;border:1px solid #dfe5ee;border-radius:18px;padding:8px;margin-bottom:6px}.metaPanel.open{display:grid}.metaPanel input,.metaPanel select{padding:8px 10px;border-radius:12px;font-size:13px}.previews{display:flex;gap:8px;overflow:auto;margin-bottom:6px}.prev{position:relative;width:72px;height:72px;flex:0 0 auto;border-radius:12px;overflow:hidden;background:#fff;border:1px solid #d0d5dd;display:grid;place-items:center}.prev img{width:100%;height:100%;object-fit:cover}.prev button{position:absolute;top:3px;right:3px;width:22px;height:22px;border:0;border-radius:50%;background:rgba(0,0,0,.65);color:white;font-weight:900}.prev .edit{left:3px;right:auto;background:rgba(110,30,120,.85);font-size:11px}.line{display:grid;grid-template-columns:42px 42px 1fr 46px;gap:7px;align-items:end}.round{width:42px;height:42px;border-radius:50%;border:0;background:#fff;border:1px solid #e0e4ec;display:grid;place-items:center;font-size:20px;cursor:pointer}.send{width:46px;height:46px;border-radius:50%;border:0;color:white;background:linear-gradient(135deg,#075E54,var(--wa));font-size:21px;cursor:pointer}.inputMsg{height:43px;min-height:43px;max-height:96px;border-radius:22px;padding:10px 14px;resize:none;background:white}.modal{position:fixed;inset:0;background:rgba(15,9,24,.84);display:none;align-items:center;justify-content:center;padding:10px;z-index:50;backdrop-filter:blur(6px)}.modal.open{display:flex}.editor{background:#fff;border-radius:22px;width:min(1120px,100%);height:min(94vh,900px);display:grid;grid-template-rows:auto auto 1fr auto;overflow:hidden;box-shadow:0 25px 90px rgba(0,0,0,.38)}.mhead{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid #e4e8f0;font-weight:950}.tools{display:flex;gap:7px;align-items:center;overflow:auto;padding:8px 10px;background:#f6f8fb;border-bottom:1px solid #e4e8f0}.tool{border:1px solid #d6dce6;background:white;border-radius:12px;padding:8px 10px;font-weight:850;cursor:pointer;white-space:nowrap}.tool.active{background:var(--sncf-purple);color:white;border-color:var(--sncf-purple)}.tools input[type=color]{width:42px;height:36px;padding:2px}.tools input[type=range]{width:95px}.canvasBox{overflow:auto;background:#20242c;display:grid;place-items:center;padding:12px;touch-action:none}.canvasBox canvas{max-width:100%;height:auto;background:white;border-radius:8px}.foot{display:flex;gap:8px;align-items:center;padding:9px 10px;border-top:1px solid #e4e8f0}.foot textarea{flex:1;min-height:42px;max-height:80px;border-radius:14px}.light img{max-width:96vw;max-height:92vh;border-radius:12px;box-shadow:0 18px 70px rgba(0,0,0,.42)}@media(max-width:850px){.app{display:block;padding:0}.side{display:none}.main{height:100vh;border-radius:0}.head{height:64px}.feed{padding:14px 10px}.bubble{max-width:91%}.metaPanel{grid-template-columns:1fr}.title h2{font-size:16px}}@media print{.side,.composer,.actions,.head button{display:none!important}.app{display:block;padding:0}.main{height:auto;box-shadow:none;border-radius:0}.feed{overflow:visible;background:white}.bubble{max-width:100%;break-inside:avoid;border:1px solid #ddd;box-shadow:none}.bubble.me{align-self:flex-start;background:#fff}.bubble:before{display:none}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <h1>Journal de chantier</h1><p>V9 connectée Supabase · fil partagé entre plusieurs téléphones.</p>
    <div class="box">
      <div class="field"><label>URL Supabase</label><input id="sbUrl" placeholder="https://xxxx.supabase.co"></div>
      <div class="field"><label>Clé anon / publishable</label><input id="sbKey" placeholder="eyJ..."></div>
      <div class="field"><label>Code chantier partagé</label><input id="chantierCode" value="SAMOIS-2026"></div>
      <button class="btn ok" onclick="connectSupabase()">Connecter</button>
    </div>
    <div class="box">
      <div class="field"><label>Nom affiché</label><input id="currentAuthor" placeholder="Yoann PETIT"></div>
      <div class="field"><label>Chantier</label><input id="siteName" value="Chantier SNCF"></div>
      <div class="field"><label>Entreprise / entité</label><input id="company" value="SNCF Réseau - UO Travaux"></div>
      <button class="btn secondary" onclick="saveSettings()">Enregistrer les réglages</button>
    </div>
    <div id="status" class="status">Non connecté. Renseigne Supabase puis clique sur Connecter.</div><br>
    <button class="btn ghost" onclick="window.print()">Imprimer / PDF</button>
  </aside>
  <main class="main">
    <header class="head"><div class="id"><div class="avatar">JC</div><div class="title"><h2 id="headerTitle">Chantier SNCF</h2><div id="headerMeta" class="meta">Journal partagé · hors connexion</div></div></div><button class="btn small secondary" onclick="window.print()">PDF</button></header>
    <section id="feed" class="feed"><div class="empty">Connecte Supabase pour afficher le fil partagé.</div></section>
    <footer class="composer">
      <div id="metaPanel" class="metaPanel"><input id="author" placeholder="Auteur"><select id="type"><option>Info</option><option>Avancement</option><option>Sécurité</option><option>Aléa</option><option>Document</option><option>Décision</option></select><input id="zone" placeholder="Zone / PK"></div>
      <div id="previews" class="previews"></div>
      <div class="line"><button class="round" onclick="fileInput.click()">📎</button><button class="round" onclick="toggleMeta()">☰</button><textarea id="message" class="inputMsg" rows="1" placeholder="Message"></textarea><button class="send" onclick="sendMessage()">➤</button></div>
      <input id="fileInput" type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" multiple hidden onchange="selectFiles(event)">
    </footer>
  </main>
</div>
<div id="annot" class="modal"><div class="editor"><div class="mhead"><span id="annotTitle">Annotation photo</span><button class="btn small secondary" onclick="closeAnnot()">Fermer</button></div><div class="tools"><button class="tool active" data-tool="draw" onclick="setTool('draw')">✏️ Dessin</button><button class="tool" data-tool="highlight" onclick="setTool('highlight')">🟨 Surlignage</button><button class="tool" data-tool="text" onclick="setTool('text')">Texte</button><button class="tool" data-tool="rect" onclick="setTool('rect')">▭ Rectangle</button><button class="tool" data-tool="circle" onclick="setTool('circle')">○ Rond</button><button class="tool" data-tool="arrow" onclick="setTool('arrow')">➜ Flèche</button><button class="tool" data-tool="eraser" onclick="setTool('eraser')">Gomme</button><input id="color" type="color" value="#D52B1E"><input id="size" type="range" min="2" max="28" value="5"><button class="tool" onclick="undo()">↶</button><button class="tool" onclick="resetCanvas()">Original</button></div><div class="canvasBox"><canvas id="canvas"></canvas></div><div class="foot"><textarea id="photoComment" placeholder="Commentaire sous la photo"></textarea><button class="btn secondary" onclick="prevPhoto()">Préc.</button><button class="btn secondary" onclick="nextPhoto()">Suiv.</button><button class="btn ok" onclick="saveAnnot()">Enregistrer</button></div></div></div>
<div id="light" class="modal light" onclick="closeLight()"><img id="lightImg" src=""></div>
<script>
const $=id=>document.getElementById(id);let sb=null,channel=null,messages=[],hidden=[],pending=[],current=null,tool='draw',canvas,ctx,start,last,drawing=false,shapeBase=null,history=[],originalData=null;const uid=localStorage.jc_uid||(localStorage.jc_uid=crypto.randomUUID());
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function slug(s){return String(s||'chantier').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,'').toLowerCase()}function status(t){$('status').textContent=t;$('headerMeta').textContent=t}
function loadSettings(){let s=JSON.parse(localStorage.jc_supabase_settings||'{}');['sbUrl','sbKey','chantierCode','currentAuthor','siteName','company'].forEach(id=>{if(s[id])$(id).value=s[id]});$('author').value=$('currentAuthor').value||s.currentAuthor||'';$('headerTitle').textContent=$('siteName').value||'Chantier SNCF'}function saveSettings(){let s={};['sbUrl','sbKey','chantierCode','currentAuthor','siteName','company'].forEach(id=>s[id]=$(id).value.trim());localStorage.jc_supabase_settings=JSON.stringify(s);$('author').value=s.currentAuthor;$('headerTitle').textContent=s.siteName||'Chantier SNCF';status('Réglages enregistrés.')}loadSettings();
async function connectSupabase(){saveSettings();const url=$('sbUrl').value.trim(),key=$('sbKey').value.trim();if(!url||!key)return alert('Renseigne URL Supabase et clé anon.');sb=window.supabase.createClient(url,key);status('Connexion au fil partagé...');await loadRemote();subscribe();}
async function loadRemote(){if(!sb)return;const code=$('chantierCode').value.trim();const {data,error}=await sb.from('chantier_messages').select('*').eq('chantier_code',code).order('created_at',{ascending:true});if(error){status('Erreur Supabase : '+error.message);return}messages=data||[];const h=await sb.from('chantier_hidden_messages').select('message_id').eq('chantier_code',code).eq('user_id',uid);hidden=(h.data||[]).map(x=>x.message_id);render();status('Connecté · '+code+' · '+messages.length+' message(s)');}
function subscribe(){if(channel)sb.removeChannel(channel);const code=$('chantierCode').value.trim();channel=sb.channel('journal_'+code).on('postgres_changes',{event:'*',schema:'public',table:'chantier_messages',filter:'chantier_code=eq.'+code},loadRemote).on('postgres_changes',{event:'*',schema:'public',table:'chantier_hidden_messages',filter:'chantier_code=eq.'+code},loadRemote).subscribe();}
function toggleMeta(){$('metaPanel').classList.toggle('open')}
function selectFiles(ev){[...ev.target.files].forEach(file=>{let isImg=file.type.startsWith('image/');let r=new FileReader();r.onload=()=>{pending.push({file,isImage:isImg,name:file.name,type:file.type||'application/octet-stream',data:r.result,comment:''});renderPreviews();if(isImg)openAnnot(pending.length-1)};r.readAsDataURL(file)});ev.target.value=''}
function renderPreviews(){let p=$('previews');p.innerHTML='';pending.forEach((f,i)=>{let d=document.createElement('div');d.className='prev';d.innerHTML=f.isImage?`<img src="${f.data}"><button class="edit" onclick="openAnnot(${i})">✎</button>`:`📄<small>${esc(f.name.split('.').pop())}</small>`;d.innerHTML+=`<button onclick="removePending(${i})">×</button>`;p.appendChild(d)})}function removePending(i){pending.splice(i,1);renderPreviews()}
async function sendMessage(){if(!sb)return alert('Connecte Supabase avant d’envoyer.');let body=$('message').value.trim();if(!body&&!pending.length)return;let files=[];try{for(const f of pending){let ext=(f.name.split('.').pop()||'bin').toLowerCase();let path=`${slug($('chantierCode').value)}/${Date.now()}_${Math.random().toString(16).slice(2)}.${ext}`;let blob=await (await fetch(f.data)).blob();let up=await sb.storage.from('chantier-media').upload(path,blob,{contentType:f.type,upsert:false});if(up.error)throw up.error;let pub=sb.storage.from('chantier-media').getPublicUrl(path);files.push({name:f.name,isImage:f.isImage,type:f.type,url:pub.data.publicUrl,comment:f.comment||''});}
let row={chantier_code:$('chantierCode').value.trim(),author:$('author').value.trim()||$('currentAuthor').value.trim()||'Agent chantier',author_id:uid,type:$('type').value,zone:$('zone').value.trim(),body,files};let {error}=await sb.from('chantier_messages').insert(row);if(error)throw error;$('message').value='';pending=[];renderPreviews();await loadRemote();}catch(e){alert('Erreur envoi : '+(e.message||e));}}
function render(){let feed=$('feed');let list=messages.filter(m=>!hidden.includes(m.id));feed.innerHTML=list.length?'':'<div class="empty">Aucun message. Écris en bas du fil pour alimenter le journal partagé.</div>';let last='';list.forEach(m=>{let day=new Date(m.created_at).toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});if(day!==last){let sep=document.createElement('div');sep.className='day';sep.textContent=day;feed.appendChild(sep);last=day}let b=document.createElement('article');b.className='bubble '+(m.author_id===uid?'me':'');let deleted=m.deleted_for_all;let tagClass=m.type==='Sécurité'?'secu':m.type==='Aléa'?'alea':m.type==='Avancement'?'ok':'';b.innerHTML=`<div class="who"><span class="author">${esc(m.author)}</span><span class="tag ${tagClass}">${esc(m.type||'Info')}</span>${m.zone?`<span class="tag">${esc(m.zone)}</span>`:''}</div>${deleted?'<div class="msg deleted">Message supprimé pour tout le monde</div>':renderFiles(m)}<div class="time">${new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div><div class="actions"><button onclick="deleteForMe('${m.id}')">Supprimer pour moi</button>${!deleted?`<button class="danger" onclick="deleteForAll('${m.id}')">Supprimer pour tout le monde</button>`:''}</div>`;feed.appendChild(b)});feed.scrollTop=feed.scrollHeight}
function renderFiles(m){let files=m.files||[],imgs=files.filter(f=>f.isImage),docs=files.filter(f=>!f.isImage);let html='';if(imgs.length){let shown=imgs.slice(0,4);html+=`<div class="media ${imgs.length===1?'one':'multi'}">`+shown.map((f,i)=>`<div><div class="photo" onclick="openLight('${esc(f.url)}')"><img src="${esc(f.url)}"></div>${f.comment?`<div class="msg">${esc(f.comment)}</div>`:''}</div>`).join('')+'</div>'}docs.forEach(f=>html+=`<div class="doc"><div class="doci">📄</div><div><div class="docname">${esc(f.name)}</div><a href="${esc(f.url)}" target="_blank">Ouvrir / télécharger</a>${f.comment?`<div>${esc(f.comment)}</div>`:''}</div></div>`);if(m.body)html+=`<div class="msg">${esc(m.body)}</div>`;return html}
async function deleteForMe(id){if(!sb)return;await sb.from('chantier_hidden_messages').upsert({chantier_code:$('chantierCode').value.trim(),message_id:id,user_id:uid});await loadRemote()}async function deleteForAll(id){if(!confirm('Supprimer ce message pour tout le monde ?'))return;await sb.from('chantier_messages').update({deleted_for_all:true,deleted_by:$('author').value||'Utilisateur',deleted_at:new Date().toISOString(),body:null,files:[]}).eq('id',id);await loadRemote()}
function openLight(url){$('lightImg').src=url;$('light').classList.add('open')}function closeLight(){$('light').classList.remove('open');$('lightImg').src=''}
function openAnnot(i){if(!pending[i]||!pending[i].isImage)return;current=i;$('annot').classList.add('open');$('photoComment').value=pending[i].comment||'';$('annotTitle').textContent='Annotation photo '+(i+1);canvas=$('canvas');ctx=canvas.getContext('2d',{willReadFrequently:true});let img=new Image();img.onload=()=>{let max=1600,w=img.naturalWidth,h=img.naturalHeight;if(w>max||h>max){let r=Math.min(max/w,max/h);w=Math.round(w*r);h=Math.round(h*r)}canvas.width=w;canvas.height=h;ctx.clearRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);originalData=pending[i].original||pending[i].data;history=[canvas.toDataURL('image/png')];bindCanvas()};img.src=pending[i].data;if(!pending[i].original)pending[i].original=pending[i].data}function closeAnnot(){$('annot').classList.remove('open')}function setTool(t){tool=t;document.querySelectorAll('.tool').forEach(x=>x.classList.toggle('active',x.dataset.tool===t))}function pos(e){let r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function bindCanvas(){canvas.onpointerdown=down;canvas.onpointermove=move;canvas.onpointerup=up;canvas.onpointercancel=up;canvas.onpointerleave=up}function snap(){history.push(canvas.toDataURL('image/png'));if(history.length>30)history.shift()}function restore(u){let im=new Image();im.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(im,0,0)};im.src=u}function down(e){e.preventDefault();canvas.setPointerCapture?.(e.pointerId);start=last=pos(e);drawing=true;snap();shapeBase=ctx.getImageData(0,0,canvas.width,canvas.height);if(tool==='text'){let t=prompt('Texte à ajouter :');if(t){ctx.save();ctx.font=`bold ${Math.max(18,+$('size').value*5)}px Arial`;ctx.fillStyle=$('color').value;ctx.lineWidth=4;ctx.strokeStyle='rgba(255,255,255,.9)';ctx.strokeText(t,start.x,start.y);ctx.fillText(t,start.x,start.y);ctx.restore()}drawing=false;shapeBase=null}}function move(e){if(!drawing||tool==='text')return;e.preventDefault();let p=pos(e);if(['rect','circle','arrow'].includes(tool)){ctx.putImageData(shapeBase,0,0);drawShape(start,p);return}drawFree(last,p);last=p}function up(e){if(!drawing)return;e.preventDefault();let p=pos(e);if(['rect','circle','arrow'].includes(tool)){ctx.putImageData(shapeBase,0,0);drawShape(start,p)}drawing=false;shapeBase=null}function drawFree(a,b){ctx.save();ctx.lineCap='round';ctx.lineJoin='round';ctx.lineWidth=+$('size').value;if(tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=+$('size').value*2.2}else if(tool==='highlight'){ctx.globalAlpha=.35;ctx.strokeStyle=$('color').value;ctx.lineWidth=+$('size').value*3}else{ctx.strokeStyle=$('color').value}ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.restore()}function drawShape(a,b){ctx.save();ctx.strokeStyle=$('color').value;ctx.fillStyle=$('color').value;ctx.lineWidth=+$('size').value;ctx.lineCap='round';ctx.lineJoin='round';if(tool==='rect')ctx.strokeRect(a.x,a.y,b.x-a.x,b.y-a.y);if(tool==='circle'){ctx.beginPath();ctx.ellipse((a.x+b.x)/2,(a.y+b.y)/2,Math.abs(b.x-a.x)/2,Math.abs(b.y-a.y)/2,0,0,Math.PI*2);ctx.stroke()}if(tool==='arrow'){let ang=Math.atan2(b.y-a.y,b.x-a.x),head=Math.max(16,+$('size').value*4);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-head*Math.cos(ang-Math.PI/6),b.y-head*Math.sin(ang-Math.PI/6));ctx.lineTo(b.x-head*Math.cos(ang+Math.PI/6),b.y-head*Math.sin(ang+Math.PI/6));ctx.closePath();ctx.fill()}ctx.restore()}function undo(){if(history.length>1){history.pop();restore(history[history.length-1])}}function resetCanvas(){if(originalData){let im=new Image();im.onload=()=>{canvas.width=im.naturalWidth;canvas.height=im.naturalHeight;ctx.drawImage(im,0,0);history=[canvas.toDataURL('image/png')]};im.src=originalData}}function saveAnnot(){if(current===null)return;pending[current].data=canvas.toDataURL('image/jpeg',0.88);pending[current].comment=$('photoComment').value.trim();closeAnnot();renderPreviews()}function imgIndexes(){return pending.map((f,i)=>f.isImage?i:null).filter(x=>x!==null)}function saveSilent(){if(current!==null&&canvas){pending[current].data=canvas.toDataURL('image/jpeg',0.88);pending[current].comment=$('photoComment').value.trim();renderPreviews()}}function prevPhoto(){let a=imgIndexes(),p=a.indexOf(current);if(p>0){saveSilent();openAnnot(a[p-1])}}function nextPhoto(){let a=imgIndexes(),p=a.indexOf(current);if(p<a.length-1){saveSilent();openAnnot(a[p+1])}}
$('message').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});$('message').addEventListener('input',e=>{e.target.style.height='43px';e.target.style.height=Math.min(e.target.scrollHeight,96)+'px'});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAnnot();closeLight()}});
</script>
