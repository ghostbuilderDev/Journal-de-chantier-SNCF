<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Journal de chantier SNCF - V11 GitHub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--sncf:#82005a;--sncf2:#d10073;--green:#00a88f;--bg:#eef2f4;--ink:#17202a;--muted:#60707b;--me:#dcf8c6;--other:white}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(135deg,#f4f6f8,#e8eef2);color:var(--ink)}.app{max-width:1150px;margin:auto;padding:18px}.hero{background:linear-gradient(135deg,var(--sncf),#4b153c);color:white;border-radius:24px;padding:22px;box-shadow:0 18px 45px #0002}.hero h1{margin:0;font-size:28px}.hero p{opacity:.9}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}.card{background:white;border-radius:20px;padding:16px;box-shadow:0 8px 28px #0001;border:1px solid #e6e9ec}label{font-size:12px;color:var(--muted);font-weight:700}input,select,textarea{width:100%;border:1px solid #d8dee4;border-radius:14px;padding:12px;font-size:15px;background:white}button{border:0;border-radius:999px;padding:11px 16px;font-weight:800;cursor:pointer;background:var(--sncf);color:white}.btn2{background:#fff;color:var(--sncf);border:1px solid #ead3e3}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.fab{position:fixed;right:18px;bottom:18px;z-index:10;background:linear-gradient(135deg,var(--sncf2),var(--sncf));box-shadow:0 10px 28px #82005a55}.chat{position:fixed;inset:0;background:#dfe9ec;z-index:20;display:none;flex-direction:column}.chat.open{display:flex}.top{height:64px;background:linear-gradient(90deg,var(--sncf),#5b0b45);color:white;display:flex;align-items:center;gap:10px;padding:10px 14px}.avatar{width:42px;height:42px;border-radius:50%;background:white;color:var(--sncf);display:grid;place-items:center;font-weight:900}.title{flex:1}.title b{display:block}.title small{opacity:.85}.messages{flex:1;overflow:auto;padding:16px;background:radial-gradient(circle at top left,#f7ffff 0,#dfe9ec 38%,#d5e1e5 100%)}.bubble{max-width:min(78%,720px);margin:9px 0;padding:8px 10px;border-radius:18px;background:var(--other);box-shadow:0 2px 8px #0001;position:relative}.bubble.me{margin-left:auto;background:var(--me);border-bottom-right-radius:5px}.bubble.other{border-bottom-left-radius:5px}.meta{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:700}.txt{white-space:pre-wrap;font-size:15px;line-height:1.35}.time{font-size:11px;color:#6b777d;text-align:right;margin-top:4px}.mediaGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:6px}.mediaGrid.one{grid-template-columns:1fr}.photo{width:100%;max-height:320px;object-fit:cover;border-radius:14px;background:#ddd;cursor:pointer}.doc{display:flex;gap:10px;align-items:center;background:#f4f5f6;border-radius:14px;padding:10px;margin-top:6px;color:var(--ink);text-decoration:none}.composer{background:#f4f7f8;padding:8px;display:flex;gap:8px;align-items:end;border-top:1px solid #cfd8dc}.composer input[type=text]{border-radius:22px;min-height:44px}.icon{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;padding:0;font-size:20px}.send{width:48px;height:44px;padding:0}.panel{position:absolute;bottom:62px;left:8px;right:8px;background:white;border-radius:18px;padding:12px;box-shadow:0 12px 45px #0002;display:none}.panel.open{display:block}.previews{display:flex;gap:8px;overflow:auto;padding:6px;background:#e9eff2}.prev{position:relative;min-width:90px}.prev img{width:90px;height:70px;object-fit:cover;border-radius:12px}.prev button{position:absolute;right:-5px;top:-5px;width:24px;height:24px;padding:0;background:#111}.edit{position:absolute;left:2px;bottom:4px;font-size:11px;padding:5px 7px}.menuMsg{position:absolute;right:4px;top:4px;background:#ffffffcc;color:#555;border:0;padding:2px 7px}.lightbox,.annot{position:fixed;inset:0;background:#000c;z-index:40;display:none;align-items:center;justify-content:center}.lightbox.open,.annot.open{display:flex}.lightbox img{max-width:96vw;max-height:92vh;border-radius:14px}.annotBox{width:min(1100px,96vw);height:min(760px,94vh);background:#202124;border-radius:18px;display:flex;flex-direction:column;overflow:hidden}.tools{display:flex;gap:6px;flex-wrap:wrap;background:white;padding:8px}.tools button{background:#eceff1;color:#111;padding:8px 10px}.tools button.active{background:var(--sncf);color:white}.canvasWrap{flex:1;display:grid;place-items:center;overflow:auto}.canvasWrap canvas{max-width:100%;max-height:100%;background:white}.hidePrint{}@media(max-width:760px){.grid{grid-template-columns:1fr}.app{padding:10px}.bubble{max-width:88%}.hero h1{font-size:22px}}@media print{.hidePrint,.fab,.composer,.top button,.panel{display:none!important}.chat{position:static;display:block}.messages{overflow:visible;background:white}.bubble{break-inside:avoid;box-shadow:none;border:1px solid #ddd}.app{display:none}}
</style></head><body><div class="app"><div class="hero"><h1>Journal de chantier SNCF</h1><p>Version GitHub Pages corrigée - fil partagé type WhatsApp avec Supabase.</p><button onclick="openChat()">Ouvrir le fil d’actualité</button></div><div class="grid"><div class="card"><h3>Connexion Supabase</h3><label>URL Supabase</label><input id="url" placeholder="https://xxxx.supabase.co"><label>Clé anon / publishable</label><input id="key" placeholder="eyJhbGci..."><div class="row" style="margin-top:10px"><button onclick="saveConfig()">Enregistrer</button><button class="btn2" onclick="connectDb()">Connecter</button></div><p id="status">Non connecté</p></div><div class="card"><h3>Chantier</h3><label>Code chantier partagé</label><input id="chantier" value="SAMOIS-2026"><label>Votre nom</label><input id="author" placeholder="Nom Prénom"><label>Zone / lot</label><input id="zone" placeholder="Ex : V2M PK 80,190 à 80,260"><label>Type</label><select id="type"><option>Info</option><option>Sécurité</option><option>Avancement</option><option>Aléa</option><option>Coactivité</option><option>Document</option></select></div></div></div><button class="fab" onclick="openChat()">💬 Fil</button>
<div class="chat" id="chat"><div class="top"><div class="avatar">JC</div><div class="title"><b id="chatTitle">Journal de chantier</b><small id="chatSub">Non connecté</small></div><button class="btn2" onclick="window.print()">PDF</button><button class="btn2" onclick="closeChat()">Fermer</button></div><div class="messages" id="messages"></div><div class="previews" id="previews" style="display:none"></div><div class="composer"><button class="icon" onclick="togglePanel()">＋</button><input id="file" type="file" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" hidden onchange="filesSelected(event)"><input id="msg" type="text" placeholder="Message" onkeydown="if(event.key==='Enter') sendMessage()"><button class="send" onclick="sendMessage()">➤</button><div class="panel" id="panel"><div class="row"><button onclick="document.getElementById('file').click()">📎 Photo / fichier</button><button onclick="document.getElementById('type').focus()">⚙️ Infos chantier</button></div></div></div></div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')"><img id="lightImg"></div>
<div class="annot" id="annot"><div class="annotBox"><div class="tools"><button onclick="setTool('pen')" class="active">Dessin</button><button onclick="setTool('text')">Texte</button><button onclick="setTool('arrow')">Flèche</button><button onclick="setTool('rect')">Rectangle</button><button onclick="setTool('circle')">Rond</button><button onclick="setTool('highlight')">Surlignage</button><button onclick="setTool('eraser')">Gomme</button><input type="color" id="color" value="#e10019"><input type="range" id="size" min="2" max="30" value="5"><button onclick="saveAnnot()">Enregistrer</button><button onclick="closeAnnot()">Annuler</button></div><div class="canvasWrap"><canvas id="canvas"></canvas></div></div></div>
<script>
let sb=null, channel=null, files=[], editing=-1, tool='pen', drawing=false, sx=0, sy=0, snapshot=null; const bucket='chantier-media';
const $=id=>document.getElementById(id); function userKey(){let k=localStorage.jcUserKey;if(!k){k=(crypto&&crypto.randomUUID)?crypto.randomUUID():('u-'+Date.now()+'-'+Math.random().toString(36).slice(2));localStorage.jcUserKey=k}return k}
window.addEventListener('load',()=>{ if(location.protocol==='file:') $('status').textContent='Ouvre cette application via GitHub Pages en HTTPS pour Supabase.'; });
function load(){['url','key','chantier','author','zone','type'].forEach(id=>{if(localStorage['jc_'+id])$(id).value=localStorage['jc_'+id]})}load();
function saveConfig(){['url','key','chantier','author','zone','type'].forEach(id=>localStorage['jc_'+id]=$(id).value.trim()); $('status').textContent='Configuration enregistrée';}
async function connectDb(){saveConfig(); if(!window.supabase)return alert('La bibliothèque Supabase ne s’est pas chargée. Vérifie que le site est bien ouvert en HTTPS via GitHub Pages, pas directement depuis un fichier bloqué.'); if(!$('url').value||!$('key').value)return alert('Colle URL Supabase + clé anon / publishable'); try{ sb=window.supabase.createClient($('url').value.trim(),$('key').value.trim()); $('status').textContent='Connecté'; $('chatSub').textContent='Chantier '+$('chantier').value; $('chatTitle').textContent='Journal - '+$('chantier').value; await loadMessages(); if(channel)sb.removeChannel(channel); channel=sb.channel('jc-'+$('chantier').value).on('postgres_changes',{event:'*',schema:'public',table:'chantier_messages',filter:'chantier_code=eq.'+$('chantier').value},()=>loadMessages()).subscribe(); }catch(e){ alert('Erreur de connexion Supabase : '+e.message); $('status').textContent='Erreur connexion'; }}
function openChat(){ $('chat').classList.add('open'); if(!sb&&$('url').value&&$('key').value) connectDb(); }
function closeChat(){ $('chat').classList.remove('open'); }
function togglePanel(){ $('panel').classList.toggle('open') }
async function loadMessages(){ if(!sb)return; const uk=userKey(); const {data:hidden}=await sb.from('chantier_message_hidden').select('message_id').eq('user_key',uk); const hiddenSet=new Set((hidden||[]).map(x=>x.message_id)); const {data,error}=await sb.from('chantier_messages').select('*').eq('chantier_code',$('chantier').value).order('created_at'); if(error){$('messages').innerHTML='<p>'+error.message+'</p>';return} render((data||[]).filter(m=>!hiddenSet.has(m.id))); }
function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function render(list){$('messages').innerHTML=list.map(m=>{if(m.deleted_for_all)return `<div class="bubble other"><i>Message supprimé pour tout le monde</i><div class=time>${fmt(m.created_at)}</div></div>`; let me=m.author_key===userKey(); let att=Array.isArray(m.attachments)?m.attachments:[]; let imgs=att.filter(a=>a.kind==='image'), docs=att.filter(a=>a.kind!=='image'); return `<div class="bubble ${me?'me':'other'}"><button class="menuMsg" onclick="msgMenu('${m.id}',${me})">⋮</button><div class="meta">${esc(m.author_name)} · ${esc(m.event_type||'Info')} ${m.zone?'· '+esc(m.zone):''}</div>${m.message_text?`<div class="txt">${esc(m.message_text)}</div>`:''}${imgs.length?`<div class="mediaGrid ${imgs.length===1?'one':''}">${imgs.map(a=>`<img class="photo" src="${a.url}" onclick="showImg('${a.url}')">`).join('')}</div>`:''}${docs.map(a=>`<a class="doc" target="_blank" href="${a.url}">📄 <span>${esc(a.name)}</span></a>`).join('')}<div class="time">${fmt(m.created_at)}</div></div>`}).join('')||'<p style="text-align:center;color:#60707b">Aucun message. Écris en bas pour démarrer le journal.</p>'; $('messages').scrollTop=$('messages').scrollHeight}
function fmt(d){return new Date(d).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
function showImg(url){$('lightImg').src=url;$('lightbox').classList.add('open')}
async function filesSelected(e){ for(const f of [...e.target.files]){const data=await readFile(f); files.push({file:f,data,kind:f.type.startsWith('image/')?'image':'file',name:f.name,type:f.type})} e.target.value=''; renderPreviews(); $('panel').classList.remove('open') }
function readFile(f){return new Promise(r=>{let fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f)})}
function renderPreviews(){let box=$('previews'); if(!files.length){box.style.display='none';box.innerHTML='';return} box.style.display='flex';box.innerHTML=files.map((f,i)=>`<div class="prev">${f.kind==='image'?`<img src="${f.data}"><button class="edit" onclick="openAnnot(${i})">Annoter</button>`:'<div class="doc">📄 '+esc(f.name)+'</div>'}<button onclick="files.splice(${i},1);renderPreviews()">×</button></div>`).join('')}
async function sendMessage(){ if(!sb) await connectDb(); let text=$('msg').value.trim(); if(!text&&!files.length)return; let uploaded=[]; for(const f of files){let blob=await (await fetch(f.data)).blob(); let ext=(f.name.split('.').pop()||'bin'); let path=`${$('chantier').value}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`; let {error}=await sb.storage.from(bucket).upload(path,blob,{contentType:f.type||blob.type,upsert:false}); if(error){alert('Erreur upload: '+error.message);return} let {data}=sb.storage.from(bucket).getPublicUrl(path); uploaded.push({kind:f.kind==='image'?'image':'file',url:data.publicUrl,name:f.name,type:f.type,path}) }
 let {error}=await sb.from('chantier_messages').insert({chantier_code:$('chantier').value,author_name:$('author').value||'Utilisateur chantier',author_key:userKey(),message_text:text,event_type:$('type').value,zone:$('zone').value,attachments:uploaded}); if(error){alert('Erreur message: '+error.message);return} $('msg').value='';files=[];renderPreviews();await loadMessages();}
async function msgMenu(id,me){let c=prompt('1 = Supprimer pour moi\n2 = Supprimer pour tout le monde'); if(c==='1'){await sb.from('chantier_message_hidden').insert({message_id:id,user_key:userKey()});loadMessages()} if(c==='2'){await sb.from('chantier_messages').update({deleted_for_all:true,message_text:null,attachments:[]}).eq('id',id);loadMessages()}}
function setTool(t){tool=t;document.querySelectorAll('.tools button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}
function openAnnot(i){editing=i;let img=new Image();img.onload=()=>{let c=$('canvas'),maxW=1000,scale=Math.min(1,maxW/img.width);c.width=img.width*scale;c.height=img.height*scale;let ctx=c.getContext('2d');ctx.drawImage(img,0,0,c.width,c.height);$('annot').classList.add('open')};img.src=files[i].data}
function closeAnnot(){$('annot').classList.remove('open')}
const c=$('canvas'), ctx=c.getContext('2d'); c.onpointerdown=e=>{drawing=true;[sx,sy]=pos(e);snapshot=ctx.getImageData(0,0,c.width,c.height); if(tool==='text'){let txt=prompt('Texte à ajouter'); if(txt){ctx.fillStyle=$('color').value;ctx.font='bold 26px Arial';ctx.fillText(txt,sx,sy)} drawing=false}}; c.onpointermove=e=>{if(!drawing)return;let [x,y]=pos(e); if(['rect','circle','arrow'].includes(tool)){ctx.putImageData(snapshot,0,0);drawShape(sx,sy,x,y)} else {ctx.lineCap='round';ctx.lineWidth=$('size').value;ctx.strokeStyle=tool==='highlight'?'rgba(255,230,0,.45)':$('color').value;ctx.globalCompositeOperation=tool==='eraser'?'destination-out':'source-over';ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(x,y);ctx.stroke();ctx.globalCompositeOperation='source-over';[sx,sy]=[x,y]}}; c.onpointerup=e=>{if(!drawing)return;drawing=false;let [x,y]=pos(e); if(['rect','circle','arrow'].includes(tool)){ctx.putImageData(snapshot,0,0);drawShape(sx,sy,x,y)}};
function pos(e){let r=c.getBoundingClientRect();return[(e.clientX-r.left)*c.width/r.width,(e.clientY-r.top)*c.height/r.height]}
function drawShape(x1,y1,x2,y2){ctx.strokeStyle=$('color').value;ctx.lineWidth=$('size').value;ctx.lineCap='round';ctx.beginPath(); if(tool==='rect'){ctx.strokeRect(x1,y1,x2-x1,y2-y1)} if(tool==='circle'){ctx.ellipse((x1+x2)/2,(y1+y2)/2,Math.abs(x2-x1)/2,Math.abs(y2-y1)/2,0,0,Math.PI*2);ctx.stroke()} if(tool==='arrow'){ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();let a=Math.atan2(y2-y1,x2-x1),l=22;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-.5),y2-l*Math.sin(a-.5));ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a+.5),y2-l*Math.sin(a+.5));ctx.stroke()}}
function saveAnnot(){files[editing].data=c.toDataURL('image/jpeg',.9);files[editing].name=files[editing].name.replace(/\.[^.]+$/,'')+'_annotee.jpg';files[editing].type='image/jpeg';closeAnnot();renderPreviews()}
</script></body></html>
